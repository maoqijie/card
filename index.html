<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#041a13">
  <title>Face Muse</title>
  <style>
    :root {
      --cream: #f6dfc9;
      --cream-soft: #dcc9b7;
      --cream-muted: rgba(246, 223, 201, 0.68);
      --line: rgba(246, 223, 201, 0.34);
      --line-strong: rgba(246, 223, 201, 0.52);
      --green-950: #02100c;
      --green-900: #041a13;
      --green-800: #08251c;
      --green-700: #0c372b;
      --pink: #f49aa5;
      --peach: #f8ba99;
      --gold: rgba(222, 169, 99, 0.58);
      --serif: "STSong", "SimSun", "Songti SC", "Noto Serif CJK SC", serif;
      --sans: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 18%, rgba(25, 82, 60, 0.56), transparent 31%),
        linear-gradient(180deg, #061a14 0%, #020b08 100%);
      color: var(--cream);
      font-family: var(--sans);
    }

    body {
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .app {
      container-type: inline-size;
      position: relative;
      width: min(100vw, 56.25vh);
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 54% 18%, rgba(91, 112, 84, 0.38), transparent 24%),
        linear-gradient(180deg, #132119 0%, #17241d 31%, #061911 71%, #02100c 100%);
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.42);
    }

    .scene {
      position: absolute;
      inset: 0 0 45.4%;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(242, 248, 240, 0.86) 0 4.8%, transparent 4.8% 5.7%, rgba(220, 224, 209, 0.72) 5.7% 9%, transparent 9%),
        radial-gradient(ellipse at 84% 34%, rgba(255, 246, 224, 0.32), transparent 17%),
        linear-gradient(90deg, #dfe4d8 0 17%, #b9beb0 17% 18.2%, #a6aa9e 18.2% 100%);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 48% 0%, rgba(8, 24, 17, 0.24), transparent 36%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.08) 19%, transparent 55%, rgba(0, 0, 0, 0.1));
      mix-blend-mode: multiply;
    }

    .soft-curtain {
      position: absolute;
      left: 0;
      top: 0;
      width: 27%;
      height: 100%;
      opacity: 0.82;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.38) 0 1.8cqw, rgba(201, 206, 194, 0.28) 1.8cqw 3.4cqw),
        linear-gradient(90deg, rgba(255, 255, 255, 0.55), rgba(202, 206, 193, 0.05));
      filter: blur(0.2cqw);
    }

    .mirror-arc {
      position: absolute;
      right: -7%;
      top: 12%;
      width: 28%;
      height: 54%;
      border: 0.85cqw solid rgba(164, 132, 91, 0.36);
      border-left-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50% 50% 0 0;
      transform: rotate(-5deg);
    }

    .shelf {
      position: absolute;
      right: 3%;
      bottom: 18%;
      width: 23%;
      height: 0.55cqw;
      border-radius: 999px;
      background: rgba(119, 96, 68, 0.35);
      box-shadow: 0 -2.7cqw 0 -2.35cqw rgba(221, 217, 204, 0.55);
    }

    .portrait {
      position: absolute;
      left: -8%;
      top: 3.8%;
      z-index: 1;
      width: 118%;
      height: 94%;
      display: grid;
      place-items: end center;
    }

    .person-cutout {
      width: 105%;
      height: 105%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 1.3cqw 3cqw rgba(0, 0, 0, 0.22));
      transform-origin: 50% 46%;
      user-select: none;
      pointer-events: none;
    }

    .guide-layer {
      position: absolute;
      left: 23.5%;
      top: 21.5%;
      z-index: 4;
      width: 49%;
      height: 52%;
      overflow: visible;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: screen;
    }

    .guide-layer .guide-stroke {
      fill: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 0.52;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .guide-layer .dash {
      stroke-dasharray: 2.6 2.4;
    }

    .guide-layer .corner {
      stroke-width: 1.45;
    }

    .guide-layer .gold-zone {
      fill: var(--gold);
      stroke: rgba(251, 220, 157, 0.72);
      stroke-width: 0.24;
    }

    .guide-layer .purple {
      stroke: #c391ff;
      stroke-width: 0.62;
      fill: none;
      filter: drop-shadow(0 0 0.25cqw rgba(195, 145, 255, 0.52));
    }

    .top-ui {
      position: absolute;
      inset: 0 0 auto;
      z-index: 6;
      height: 15.7%;
      color: rgba(255, 255, 255, 0.92);
      pointer-events: none;
    }

    .time {
      position: absolute;
      left: 9%;
      top: 4.9cqw;
      font-size: 3.55cqw;
      font-weight: 700;
      line-height: 1;
    }

    .status {
      position: absolute;
      right: 7.1%;
      top: 4.2cqw;
      display: flex;
      align-items: center;
      gap: 1.35cqw;
    }

    .signal {
      display: flex;
      align-items: end;
      gap: 0.35cqw;
      height: 2.55cqw;
    }

    .signal i {
      display: block;
      width: 0.72cqw;
      border-radius: 999px;
      background: currentColor;
    }

    .signal i:nth-child(1) { height: 0.9cqw; }
    .signal i:nth-child(2) { height: 1.35cqw; }
    .signal i:nth-child(3) { height: 1.9cqw; }
    .signal i:nth-child(4) { height: 2.45cqw; }

    .wifi {
      width: 3.7cqw;
      height: 2.65cqw;
    }

    .battery {
      position: relative;
      width: 5.15cqw;
      height: 2.45cqw;
      border: 0.34cqw solid currentColor;
      border-radius: 0.65cqw;
      box-shadow: inset 0 0 0 0.36cqw rgba(255, 255, 255, 0.26);
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -0.86cqw;
      top: 0.55cqw;
      width: 0.38cqw;
      height: 0.95cqw;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.7;
    }

    .brand-dot {
      position: absolute;
      left: 50%;
      top: 5.05cqw;
      width: 0.82cqw;
      height: 0.82cqw;
      border-radius: 50%;
      background: #49d06d;
      transform: translateX(-50%);
      box-shadow: 0 0 1.3cqw rgba(73, 208, 109, 0.35);
    }

    .brand {
      position: absolute;
      left: 50%;
      top: 8.8cqw;
      margin: 0;
      color: var(--cream);
      font-family: Georgia, "Times New Roman", var(--serif);
      font-size: 4.55cqw;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      transform: translateX(-50%);
      white-space: nowrap;
      text-shadow: 0 0.25cqw 1.3cqw rgba(0, 0, 0, 0.18);
    }

    .help,
    .info {
      pointer-events: auto;
      position: absolute;
      top: 12.7cqw;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(246, 223, 201, 0.28);
      color: var(--cream);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0.25cqw 0.65cqw rgba(255, 255, 255, 0.08);
    }

    .help {
      left: 4.4%;
      width: 7.45cqw;
      height: 7.45cqw;
      border-radius: 2.15cqw;
      font-size: 3.85cqw;
      font-weight: 700;
    }

    .info {
      right: 3.7%;
      height: 7.15cqw;
      gap: 1.35cqw;
      padding: 0 2.1cqw;
      border-radius: 2.2cqw;
      font-size: 2.95cqw;
      font-weight: 700;
      white-space: nowrap;
    }

    .info svg {
      width: 3.95cqw;
      height: 3.95cqw;
      fill: currentColor;
    }

    .scan-corners {
      position: absolute;
      left: 28.5%;
      top: 31.1%;
      z-index: 5;
      width: 44%;
      height: 45%;
      pointer-events: none;
      opacity: 0.35;
    }

    .scan-corners span {
      position: absolute;
      width: 5.4cqw;
      height: 5.4cqw;
      border-color: rgba(255, 244, 230, 0.94);
      border-style: solid;
    }

    .scan-corners span:nth-child(1) {
      left: 0;
      top: 0;
      border-width: 0.55cqw 0 0 0.55cqw;
      border-radius: 2.05cqw 0 0;
    }

    .scan-corners span:nth-child(2) {
      right: 0;
      top: 0;
      border-width: 0.55cqw 0.55cqw 0 0;
      border-radius: 0 2.05cqw 0 0;
    }

    .scan-corners span:nth-child(3) {
      left: -4%;
      bottom: 0;
      border-width: 0 0 0.55cqw 0.55cqw;
      border-radius: 0 0 0 2.05cqw;
    }

    .scan-corners span:nth-child(4) {
      right: 2%;
      bottom: 0;
      border-width: 0 0.55cqw 0.55cqw 0;
      border-radius: 0 0 2.05cqw;
    }

    .panel {
      position: absolute;
      inset-inline: 0;
      bottom: 0;
      z-index: 7;
      height: 46.1%;
      padding: 6.2cqw 5.85cqw 1.2cqw;
      border-radius: 4.45cqw 4.45cqw 0 0;
      border: 1px solid rgba(246, 223, 201, 0.2);
      border-bottom: 0;
      background:
        radial-gradient(38cqw 27cqw at 26% 12%, rgba(71, 104, 81, 0.22), transparent 66%),
        linear-gradient(135deg, rgba(10, 48, 36, 0.985), rgba(3, 28, 20, 0.995) 48%, rgba(1, 20, 15, 0.995));
      box-shadow: 0 -1.2cqw 4cqw rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(22px) saturate(1.05);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 1.35cqw 2.65cqw 1.35cqw;
      border: 1px solid rgba(246, 223, 201, 0.2);
      border-radius: 3.9cqw;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      top: 7.8cqw;
      right: 5.8cqw;
      width: 2.85cqw;
      height: 2.85cqw;
      color: var(--cream);
    }

    .headline {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 7.7cqw;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
      text-shadow: 0 0.25cqw 1.2cqw rgba(0, 0, 0, 0.18);
    }

    .chips {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.18fr 0.83fr 1fr 1.12fr;
      gap: 1.45cqw;
      margin-top: 3.1cqw;
    }

    .chip {
      min-width: 0;
      height: 5.95cqw;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1.2cqw;
      padding: 0 1.2cqw;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 0.3cqw 1.6cqw rgba(255, 255, 255, 0.035);
      font-size: 2.75cqw;
      line-height: 1;
      white-space: nowrap;
    }

    .chip svg,
    .card-icon svg,
    .button svg,
    .comment svg {
      width: 3.4cqw;
      height: 3.4cqw;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .lesson-cards {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 2.55cqw;
      margin-top: 3.7cqw;
    }

    .lesson-card {
      min-height: 14.7cqw;
      padding: 1.55cqw 2.7cqw 1.45cqw 3cqw;
      border: 1px solid rgba(246, 223, 201, 0.28);
      border-radius: 2.8cqw;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025)),
        rgba(15, 60, 46, 0.54);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 1.6cqw;
      min-height: 3.8cqw;
      color: var(--cream-soft);
      font-size: 2.55cqw;
      line-height: 1;
    }

    .card-icon {
      width: 4.15cqw;
      height: 4.15cqw;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff7e8;
      background: linear-gradient(135deg, var(--pink), var(--peach));
      box-shadow: 0 0.45cqw 1.6cqw rgba(236, 137, 142, 0.28);
    }

    .card-title {
      min-width: 0;
      white-space: nowrap;
    }

    .card-action {
      margin-left: auto;
      color: rgba(246, 223, 201, 0.54);
      font-size: 4.15cqw;
      line-height: 1;
    }

    .card-copy {
      margin: 1.1cqw 0 0;
      color: var(--cream);
      font-size: 3.25cqw;
      font-weight: 700;
      line-height: 1.24;
      letter-spacing: 0;
    }

    .progress-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 3cqw;
      margin-top: 2.8cqw;
      color: var(--cream);
      font-size: 2.75cqw;
    }

    .timeline {
      position: relative;
      height: 2.2cqw;
    }

    .timeline::before,
    .timeline::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      height: 0.45cqw;
      border-radius: 999px;
      transform: translateY(-50%);
    }

    .timeline::before {
      right: 0;
      background: rgba(246, 223, 201, 0.32);
    }

    .timeline::after {
      width: 15%;
      background: linear-gradient(90deg, var(--pink), #ffa7ad);
    }

    .dot {
      position: absolute;
      top: 50%;
      width: 1.52cqw;
      height: 1.52cqw;
      border-radius: 50%;
      background: #8f9185;
      transform: translate(-50%, -50%);
    }

    .dot.is-active {
      left: 15%;
      width: 1.8cqw;
      height: 1.8cqw;
      background: #fff3e8;
      border: 0.43cqw solid var(--pink);
      box-shadow: 0 0 0 0.18cqw rgba(255, 255, 255, 0.42);
    }

    .button {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 9.5cqw;
      margin-top: 3.1cqw;
      border: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2.95cqw;
      color: #fff7ec;
      background: linear-gradient(104deg, #f393a2 0%, #f8ad99 55%, #f9bf9c 100%);
      box-shadow: 0 0.85cqw 2.7cqw rgba(240, 132, 126, 0.18);
      font: 700 4.15cqw/1 var(--sans);
      letter-spacing: 0;
    }

    .video-mark {
      width: 6.25cqw;
      height: 5.05cqw;
      display: grid;
      place-items: center;
      border-radius: 1cqw;
      background: rgba(255, 255, 255, 0.7);
      color: #d28279;
    }

    .video-mark svg {
      width: 4.1cqw;
      height: 4.1cqw;
      fill: currentColor;
      stroke: none;
    }

    .comment {
      position: relative;
      z-index: 1;
      min-height: 7.55cqw;
      margin-top: 2.85cqw;
      padding: 0 3.4cqw 0 2.55cqw;
      border: 1px solid rgba(246, 223, 201, 0.32);
      border-radius: 2.8cqw;
      display: flex;
      align-items: center;
      gap: 3.3cqw;
      color: var(--cream-soft);
      background: rgba(255, 255, 255, 0.035);
      font-size: 3.1cqw;
      line-height: 1;
      white-space: nowrap;
    }

    .avatars {
      width: 13.7cqw;
      height: 4.4cqw;
      position: relative;
      flex: 0 0 auto;
    }

    .avatar {
      position: absolute;
      top: 0;
      width: 4.7cqw;
      height: 4.7cqw;
      border-radius: 50%;
      border: 0.18cqw solid rgba(246, 223, 201, 0.88);
      background:
        radial-gradient(circle at 50% 43%, #2b2520 0 16%, transparent 17%),
        radial-gradient(ellipse at 50% 100%, #e2b090 0 24%, transparent 25%),
        linear-gradient(135deg, #eed2ba, #a98469);
      box-shadow: 0 0.25cqw 0.8cqw rgba(0, 0, 0, 0.2);
    }

    .avatar:nth-child(1) {
      left: 0;
    }

    .avatar:nth-child(2) {
      left: 3.55cqw;
      filter: hue-rotate(8deg) brightness(1.04);
    }

    .avatar:nth-child(3) {
      left: 7.1cqw;
      filter: hue-rotate(-9deg) brightness(0.96);
    }

    .comment-copy {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 auto;
    }

    .comment svg {
      width: 3.6cqw;
      height: 3.6cqw;
      color: rgba(246, 223, 201, 0.58);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Face Muse 摄像头带画妆容教程">
    <section class="scene" aria-label="摄像头妆容识别画面">
      <div class="soft-curtain" aria-hidden="true"></div>
      <div class="mirror-arc" aria-hidden="true"></div>
      <div class="shelf" aria-hidden="true"></div>

      <div class="portrait" aria-hidden="true">
        <img class="person-cutout" src="./assets/face-muse-person-cutout.png" alt="">
      </div>

      <div class="top-ui" aria-hidden="true">
        <div class="time">9:41</div>
        <div class="brand-dot"></div>
        <h2 class="brand">Face Muse</h2>
        <div class="status">
          <span class="signal"><i></i><i></i><i></i><i></i></span>
          <svg class="wifi" viewBox="0 0 40 28">
            <path d="M4 8c10.5-8 21.5-8 32 0" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
            <path d="M11 15c6-4.8 12-4.8 18 0" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
            <path d="M18 22c1.7-1.5 2.9-1.5 4 0" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
          </svg>
          <span class="battery"></span>
        </div>
        <button class="help" type="button" aria-label="帮助">?</button>
        <button class="info" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M12 1.8l2.25 6.2 6.2 2.25-6.2 2.25L12 18.7l-2.25-6.2-6.2-2.25 6.2-2.25L12 1.8z"/>
          </svg>
          <span>妆容信息</span>
        </button>
      </div>
    </section>

    <section class="panel" aria-label="今晚的第一套完整妆">
      <svg class="spark" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M12 1.8l2.25 6.2 6.2 2.25-6.2 2.25L12 18.7l-2.25-6.2-6.2-2.25 6.2-2.25L12 1.8z"/>
      </svg>

      <h1 class="headline">今晚的第一套完整妆</h1>

      <div class="chips" aria-label="课程信息">
        <div class="chip">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="6" width="16" height="13" rx="4"/>
            <circle cx="12" cy="12.5" r="3.1"/>
            <path d="M8 4h2.6M16.5 4h.1"/>
          </svg>
          <span>摄像头带画</span>
        </div>
        <div class="chip">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8.6"/>
            <path d="M12 7.3v5.2l3.4 2.1"/>
          </svg>
          <span>28 分钟</span>
        </div>
        <div class="chip">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 20.2C6.3 16.4 3.4 13.4 3.4 9.6c0-2.4 1.9-4.2 4.2-4.2 1.4 0 2.7.7 3.5 1.8.8-1.1 2.1-1.8 3.5-1.8 2.3 0 4.2 1.8 4.2 4.2 0 3.8-2.9 6.8-8.6 10.6z"/>
          </svg>
          <span>新手友好</span>
        </div>
        <div class="chip">

  <script>
    (() => {
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!window.gsap || prefersReducedMotion) {
        return;
      }

      const intro = gsap.timeline({ defaults: { ease: "power3.out" } });
      intro
        .from(".top-ui > *", { y: -12, opacity: 0, duration: 0.56, stagger: 0.055 })
        .from(".person-cutout", { scale: 1.025, opacity: 0, duration: 0.75 }, 0.08)
        .from(".panel", { yPercent: 12, opacity: 0, duration: 0.62 }, 0.56)
        .from(".headline, .chips .chip, .lesson-card, .progress-row, .button, .comment", {
          y: 18,
          opacity: 0,
          duration: 0.48,
          stagger: 0.045
        }, 0.74);

      gsap.to(".person-cutout", {
        scale: 1.006,
        x: 2,
        y: -2,
        duration: 2.1,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut"
      });

      gsap.to(".brand-dot", {
        scale: 1.65,
        opacity: 0.56,
        duration: 1.1,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut"
      });

      gsap.to(".button", {
        boxShadow: "0 0.95cqw 3.8cqw rgba(240, 132, 126, 0.34)",
        duration: 1.3,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut"
      });
    })();
