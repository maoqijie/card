<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 五个页面轮播展示。">
  <title>Face Muse - 拼接展示</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg: #020907;
      --control-bg: rgba(7, 20, 14, .72);
      --control-border: rgba(255, 255, 255, .24);
      --control-shadow: 0 18px 44px rgba(0, 0, 0, .34);
      --ink: #fff;
      --muted: rgba(255, 255, 255, .58);
      background: var(--page-bg);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button {
      padding: 0;
      border: 0;
      font: inherit;
      color: inherit;
      background: none;
      -webkit-tap-highlight-color: transparent;
    }

    .showcase {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 560px;
      overflow: hidden;
      background: var(--page-bg);
      isolation: isolate;
      touch-action: pan-y;
    }

    .showcase-track {
      width: 100%;
      height: 100%;
      display: flex;
      transition: transform 560ms cubic-bezier(.22, .8, .22, 1);
      will-change: transform;
    }

    .showcase.is-dragging .showcase-track {
      transition: none;
    }

    .showcase-slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      min-width: 0;
      background: var(--page-bg);
    }

    .page-frame {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: var(--page-bg);
    }

    .nav-button {
      position: absolute;
      top: 50%;
      z-index: 3;
      width: clamp(44px, 6vw, 64px);
      height: clamp(44px, 6vw, 64px);
      display: grid;
      place-items: center;
      border: 1px solid var(--control-border);
      border-radius: 50%;
      background: var(--control-bg);
      box-shadow: var(--control-shadow);
      backdrop-filter: blur(16px);
      transform: translateY(-50%);
      cursor: pointer;
      transition: background-color .2s ease, opacity .2s ease, transform .2s ease;
    }

    .nav-button::before {
      content: "";
      width: 34%;
      height: 34%;
      border-top: 2px solid var(--ink);
      border-left: 2px solid var(--ink);
    }

    .nav-button:hover {
      background: rgba(16, 39, 27, .86);
      transform: translateY(-50%) scale(1.04);
    }

    .nav-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, .7);
      outline-offset: 4px;
    }

    .nav-button[disabled] {
      opacity: .28;
      cursor: default;
      pointer-events: none;
    }

    .nav-button.prev {
      left: clamp(14px, 4vw, 42px);
    }

    .nav-button.prev::before {
      transform: translateX(12%) rotate(-45deg);
    }

    .nav-button.next {
      right: clamp(14px, 4vw, 42px);
    }

    .nav-button.next::before {
      transform: translateX(-12%) rotate(135deg);
    }

    .page-indicator {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 13px;
      border: 1px solid var(--control-border);
      border-radius: 999px;
      background: var(--control-bg);
      box-shadow: var(--control-shadow);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    .page-count {
      min-width: 34px;
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
      text-align: center;
    }

    .page-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: width .22s ease, background-color .22s ease;
    }

    .page-dot.is-active {
      width: 24px;
      border-radius: 999px;
      background: var(--ink);
    }

    @supports not (height: 100svh) {
      .showcase {
        height: 100vh;
      }
    }

    @media (max-width: 640px) {
      .nav-button {
        top: auto;
        bottom: max(18px, env(safe-area-inset-bottom));
        width: 48px;
        height: 48px;
      }

      .nav-button.prev {
        left: 16px;
      }

      .nav-button.next {
        right: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .showcase-track,
      .nav-button,
      .page-dot {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="showcase" aria-label="Face Muse 拼接展示">
    <button class="nav-button prev" type="button" aria-label="上一页"></button>
    <button class="nav-button next" type="button" aria-label="下一页"></button>
    <div class="page-indicator" aria-label="当前页">
      <span class="page-dot is-active" aria-hidden="true"></span>
      <span class="page-dot" aria-hidden="true"></span>
      <span class="page-dot" aria-hidden="true"></span>
      <span class="page-dot" aria-hidden="true"></span>
      <span class="page-dot" aria-hidden="true"></span>
      <span class="page-count" aria-live="polite">1 / 5</span>
    </div>

    <div class="showcase-track">
      <section class="showcase-slide" aria-label="页面一">
        <iframe class="page-frame" data-src="./index.html" title="Face Muse 首页" loading="eager"></iframe>
      </section>
      <section class="showcase-slide" aria-label="页面二">
        <iframe class="page-frame" data-src="./2.html" title="Face Muse 页面二" loading="lazy"></iframe>
      </section>
      <section class="showcase-slide" aria-label="页面三">
        <iframe class="page-frame" data-src="./3.html" title="Face Muse 页面三" loading="lazy"></iframe>
      </section>
      <section class="showcase-slide" aria-label="页面四">
        <iframe class="page-frame" data-src="./4.html" title="Face Muse 页面四" loading="lazy"></iframe>
      </section>
      <section class="showcase-slide" aria-label="页面五">
        <iframe class="page-frame" data-src="./5.html" title="Face Muse 页面五" loading="lazy"></iframe>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const showcase = document.querySelector(".showcase");
      const track = document.querySelector(".showcase-track");
      const prevButton = document.querySelector(".nav-button.prev");
      const nextButton = document.querySelector(".nav-button.next");
      const dots = Array.from(document.querySelectorAll(".page-dot"));
      const frames = Array.from(document.querySelectorAll(".page-frame"));
      const pageCount = document.querySelector(".page-count");
      const slideCount = dots.length;
      let currentIndex = 0;
      let dragStartX = 0;
      let dragOffset = 0;
      let isDragging = false;

      const clampIndex = (index) => Math.max(0, Math.min(index, slideCount - 1));

      const loadFrame = (index) => {
        const frame = frames[clampIndex(index)];

        if (frame && !frame.hasAttribute("src")) {
          frame.src = frame.dataset.src;
        }
      };

      const render = (index, offset = 0) => {
        currentIndex = clampIndex(index);
        loadFrame(currentIndex);
        track.style.transform = `translate3d(calc(${-currentIndex * 100}% + ${offset}px), 0, 0)`;
        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === slideCount - 1;
        pageCount.textContent = `${currentIndex + 1} / ${slideCount}`;
        dots.forEach((dot, dotIndex) => dot.classList.toggle("is-active", dotIndex === currentIndex));
      };

      const goTo = (index) => {
        const nextIndex = clampIndex(index);
        loadFrame(nextIndex);
        render(nextIndex);
      };

      prevButton.addEventListener("click", () => goTo(currentIndex - 1));
      nextButton.addEventListener("click", () => goTo(currentIndex + 1));

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          goTo(currentIndex - 1);
        }

        if (event.key === "ArrowRight") {
          goTo(currentIndex + 1);
        }
      });

      showcase.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) {
          return;
        }

        isDragging = true;
        dragStartX = event.clientX;
        dragOffset = 0;
        showcase.classList.add("is-dragging");
        showcase.setPointerCapture(event.pointerId);
      });

      showcase.addEventListener("pointermove", (event) => {
        if (!isDragging) {
          return;
        }

        dragOffset = event.clientX - dragStartX;
        render(currentIndex, dragOffset);
      });

      const finishDrag = () => {
        if (!isDragging) {
          return;
        }

        const threshold = Math.min(120, showcase.clientWidth * .18);
        const nextIndex = Math.abs(dragOffset) > threshold
          ? currentIndex + (dragOffset < 0 ? 1 : -1)
          : currentIndex;

        isDragging = false;
        dragOffset = 0;
        showcase.classList.remove("is-dragging");
        render(nextIndex);
      };

      showcase.addEventListener("pointerup", finishDrag);
      showcase.addEventListener("pointercancel", finishDrag);

      requestAnimationFrame(() => render(0));
    })();
  </script>
</body>
</html>
