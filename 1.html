<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，帮化妆新手把心动玫瑰妆先试到自己脸上。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/portrait-left.jpg">
  <link rel="preload" as="image" href="./assets/portrait-right-feed.webp" fetchpriority="high">
  <title>Face Muse - 先把心动妆试到自己脸上</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/portrait-right-feed.webp");
      --hero-position: 50% 34%;
      --hero-size: cover;
      --headline-size: 50rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes hero-breathe {
      from { transform: scale(1.015); }
      to { transform: scale(1.045); }
    }

    .status-bar {
      position: absolute;
      top: 44rem;
      left: 80rem;
      right: 39rem;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 34rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .signal {
      display: flex;
      align-items: end;
      gap: 5rem;
      width: 42rem;
      height: 31rem;
    }

    .signal span {
      width: 7rem;
      border-radius: 7rem;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 12rem; }
    .signal span:nth-child(2) { height: 18rem; }
    .signal span:nth-child(3) { height: 25rem; }
    .signal span:nth-child(4) { height: 31rem; }

    .wifi {
      position: relative;
      width: 39rem;
      height: 31rem;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 6rem solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 1rem;
      width: 36rem;
      height: 36rem;
    }

    .wifi::after {
      top: 11rem;
      width: 18rem;
      height: 18rem;
    }

    .wifi i {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    .battery {
      position: relative;
      width: 51rem;
      height: 28rem;
      border: 3rem solid rgba(255, 255, 255, 0.92);
      border-radius: 7rem;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 5rem 7rem;
      border-radius: 3rem;
      background: #fff;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8rem;
      top: 8rem;
      width: 4rem;
      height: 11rem;
      border-radius: 0 4rem 4rem 0;
      background: rgba(255, 255, 255, 0.86);
    }

    .top-nav {
      position: absolute;
      top: 127rem;
      left: 38rem;
      right: 38rem;
      z-index: 4;
      display: grid;
      grid-template-columns: 58rem 1fr 58rem;
      align-items: center;
      gap: 24rem;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 58rem;
      height: 58rem;
      border: 0;
      padding: 0;
      color: #fff;
      background: transparent;
      cursor: pointer;
    }

    .icon-button svg {
      width: 54rem;
      height: 54rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .channels {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, max-content);
      justify-content: space-between;
      align-items: center;
      gap: 15rem;
      color: rgba(255, 255, 255, 0.54);
      font-size: 31rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .channel {
      position: relative;
      white-space: nowrap;
    }

    .channel.active {
      color: #fff;
      font-size: 39rem;
      text-shadow: 0 4rem 18rem rgba(0, 0, 0, 0.24);
    }

    .channel.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24rem;
      width: 70rem;
      height: 5rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 397rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    h1 {
      flex: 1;
      margin: 0;
      color: #fff;
      font-size: var(--headline-size);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, 0.42);
    }

    .ai-badge {
      flex: 0 0 auto;
      padding: 11rem 16rem 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.28);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.08);
      font-size: 26rem;
      line-height: 1;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
    }

    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 34rem;
      background: linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: 145rem;
      background: rgba(255, 255, 255, 0.025);
    }

    .stat {
      display: grid;
      align-content: center;
      gap: 16rem;
      padding-left: 36rem;
      border-right: 1rem solid rgba(255, 255, 255, 0.035);
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat span {
      color: rgba(255, 255, 255, 0.52);
      font-size: 28rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .stat strong {
      color: #fff;
      font-size: 35rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .card-copy {
      position: relative;
      min-height: 262rem;
      padding: 51rem 246rem 34rem 37rem;
      color: rgba(255, 255, 255, 0.94);
      font-size: 31rem;
      line-height: 1.62;
      font-weight: 650;
      letter-spacing: 0;
    }

    .spark {
      display: inline-block;
      margin-right: 16rem;
      font-size: 34rem;
      color: #fff;
      filter: drop-shadow(0 0 8rem rgba(255, 255, 255, 0.5));
    }

    .mini-route {
      position: absolute;
      right: 45rem;
      bottom: 35rem;
      width: 180rem;
      height: 170rem;
      opacity: 0.9;
    }

    .route-path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 3;
      stroke-dasharray: 7 8;
      stroke-linecap: round;
    }

    .route-dot {
      fill: #fff;
      stroke: rgba(255, 255, 255, 0.26);
      stroke-width: 12;
    }

    .route-tag {
      position: absolute;
      display: inline-grid;
      place-items: center;
      min-width: 68rem;
      height: 39rem;
      padding: 0 11rem;
      border-radius: 7rem;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.13);
      font-size: 25rem;
      line-height: 1;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0;
      transform: rotate(4deg);
    }

    .route-tag.first {
      top: 27rem;
      right: 0;
    }

    .route-tag.second {
      left: 26rem;
      bottom: 5rem;
      transform: rotate(-4deg);
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 959rem;
    }

    .note-label {
      margin: 0 0 26rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 31rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 31rem;
    }

    .quote {
      position: relative;
      min-height: 171rem;
      padding: 0 152rem 0 34rem;
      border-left: 2rem dashed rgba(255, 255, 255, 0.14);
    }

    .quote h2 {
      margin: 0 0 18rem;
      color: #fff;
      font-size: 35rem;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      position: absolute;
      left: -5rem;
      top: -10rem;
      color: rgba(255, 255, 255, 0.42);
      font-size: 56rem;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 29rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 0;
      top: 8rem;
      width: 121rem;
      height: 156rem;
      overflow: hidden;
      border-radius: 11rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    .progress {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1554rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10rem;
    }

    .progress span {
      position: relative;
      height: 6rem;
      overflow: hidden;
      border-radius: 999rem;
      background: rgba(255, 255, 255, 0.16);
    }

    .progress span::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--fill, 0%);
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.68);
    }

    .action-row {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1595rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20rem;
    }

    .action-button {
      height: 99rem;
      border: 0;
      border-radius: 17rem;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(99, 139, 97, 0.72);
      font-size: 34rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      backdrop-filter: blur(8rem);
    }

    .action-button.secondary {
      color: rgba(255, 255, 255, 0.55);
      background: rgba(93, 138, 93, 0.44);
    }

    .swipe-tip {
      position: absolute;
      left: 0;
      right: 0;
      top: 1732rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10rem;
      color: rgba(255, 255, 255, 0.53);
      font-size: 27rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chevrons {
      position: relative;
      width: 25rem;
      height: 25rem;
    }

    .chevrons::before,
    .chevrons::after {
      content: "";
      position: absolute;
      left: 5rem;
      width: 16rem;
      height: 16rem;
      border-left: 4rem solid rgba(255, 255, 255, 0.55);
      border-top: 4rem solid rgba(255, 255, 255, 0.55);
      transform: rotate(45deg);
    }

    .chevrons::before { top: 6rem; }
    .chevrons::after { top: -3rem; opacity: 0.7; }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      height: 190rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1.08fr 1fr 1fr;
      align-items: start;
      padding: 35rem 34rem 0;
      background: #000;
      box-shadow: 0 -20rem 40rem rgba(0, 0, 0, 0.22);
    }

    .bottom-link {
      display: grid;
      justify-items: center;
      gap: 11rem;
      color: rgba(255, 255, 255, 0.46);
      text-decoration: none;
      font-size: 33rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .bottom-link.active {
      color: #fff;
    }

    .plus-button {
      display: grid;
      place-items: center;
      justify-self: center;
      width: 82rem;
      height: 58rem;
      margin-top: -9rem;
      border: 6rem solid #fff;
      border-radius: 20rem;
      color: #fff;
      background: #000;
      box-shadow: -5rem 0 0 #21f4ee, 5rem 0 0 #fe2c55;
    }

    .plus-button svg {
      width: 38rem;
      height: 38rem;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 17rem;
      z-index: 6;
      width: 298rem;
      height: 7rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, 0.8);
      outline-offset: 5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <div class="system-icons">
        <span class="signal"><span></span><span></span><span></span><span></span></span>
        <span class="wifi"><i></i></span>
        <span class="battery"></span>
      </div>
    </div>

    <nav class="top-nav" aria-label="频道导航">
      <button class="icon-button" type="button" aria-label="打开菜单">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M7 14h34M7 24h34M7 34h34"></path></svg>
      </button>
      <div class="channels" aria-label="内容频道">
        <span class="channel">团购</span>
        <span class="channel">经验</span>
        <span class="channel">北京</span>
        <span class="channel">关注</span>
        <span class="channel">商城</span>
        <span class="channel active">推荐</span>
      </div>
      <button class="icon-button" type="button" aria-label="搜索">
        <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="21" cy="21" r="13"></circle><path d="M31.5 31.5 42 42"></path></svg>
      </button>
    </nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">先把心动妆试到自己脸上</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="推荐摘要卡片">
        <div class="stat-grid">
          <div class="stat"><span>妆容</span><strong>玫瑰妆</strong></div>
          <div class="stat"><span>相似度</span><strong>86%</strong></div>
          <div class="stat"><span>对比</span><strong>双图</strong></div>
          <div class="stat"><span>步骤</span><strong>4步</strong></div>
        </div>
        <div class="card-copy">
          <span class="spark">✦</span>已把参考图与自拍叠画对齐，按底妆、眼影、腮红、唇线四步拆解，方便直接保存到练习册。
          <div class="mini-route" aria-hidden="true">
            <svg viewBox="0 0 180 170">
              <path class="route-path" d="M28 48 C76 30 110 51 116 77 S77 95 95 124 S135 130 152 112"></path>
              <circle class="route-dot" cx="28" cy="48" r="7"></circle>
              <circle class="route-dot" cx="116" cy="77" r="7"></circle>
              <circle class="route-dot" cx="95" cy="124" r="7"></circle>
              <circle class="route-dot" cx="152" cy="112" r="7"></circle>
            </svg>
            <span class="route-tag first">参考图</span>
            <span class="route-tag second">自拍</span>
          </div>
        </div>
      </article>

      <section class="creator-note" aria-label="美妆博主推荐">
        <p class="note-label">低饱和玫瑰妆</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>底妆明度拉平，先把脸颊和鼻梁的灰度统一。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-left.jpg')"></span>
              <span>步骤 01：肤色先干净，后续颜色才不显脏。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-01.png')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>眼影范围缩小，腮红位置上移，唇线边界柔化。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span>练习记录：低饱和玫瑰妆 4 步已生成。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-02.png')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <div class="progress" aria-hidden="true">
        <span style="--fill: 100%"></span>
        <span style="--fill: 63%"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="action-row" aria-label="推荐操作">
        <button class="action-button secondary" type="button">切换对比</button>
        <button class="action-button" type="button">保存练习册</button>
      </div>

      <div class="swipe-tip" aria-hidden="true">
        <span class="chevrons"></span>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!window.gsap) {
        document.documentElement.dataset.gsapLoaded = "false";
        return;
      }

      document.documentElement.dataset.gsapLoaded = "true";
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) {
        return;
      }

      gsap.from(".hero-grain", { scale: 1.08, duration: 1.1, ease: "power2.out" });
      gsap.from(".status-bar, .top-nav", { y: -16, autoAlpha: 0, duration: 0.42, stagger: 0.08, ease: "power3.out" });
      gsap.from(".headline", { y: 28, autoAlpha: 0, duration: 0.58, delay: 0.12, ease: "power3.out" });
      gsap.from(".info-card", { y: 34, autoAlpha: 0, duration: 0.64, delay: 0.24, ease: "power3.out" });
      gsap.from(".stat", { y: 16, autoAlpha: 0, duration: 0.42, delay: 0.42, stagger: 0.045, ease: "power2.out" });
      gsap.from(".quote", { x: -18, autoAlpha: 0, duration: 0.5, delay: 0.48, stagger: 0.09, ease: "power3.out" });
      gsap.from(".progress span, .action-button, .swipe-tip", { y: 16, duration: 0.42, delay: 0.66, stagger: 0.04, ease: "power2.out" });
      gsap.from(".bottom-link", { y: 16, duration: 0.38, delay: 0.72, stagger: 0.035, ease: "power2.out" });
      gsap.to(".route-dot", { scale: 1.25, transformOrigin: "50% 50%", duration: 0.9, repeat: -1, yoyo: true, stagger: 0.12, ease: "sine.inOut" });
      gsap.to(".chevrons", { y: -7, duration: 0.9, repeat: -1, yoyo: true, ease: "sine.inOut" });

      document.querySelectorAll("button, .bottom-link").forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(item, { scale: 0.96 }, { scale: 1, duration: 0.32, ease: "back.out(2.4)" });
        });
      });
    });
  </script>
</body>
</html>
