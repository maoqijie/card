<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，帮化妆新手把心动玫瑰妆先试到自己脸上。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/portrait-left.jpg">
  <link rel="preload" as="image" href="./assets/portrait-right-feed.webp" fetchpriority="high">
  <link rel="stylesheet" href="./assets/feed-components.css">
  <title>Face Muse - 先把心动妆试到自己脸上</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/portrait-right-feed.webp");
      --hero-position: 50% 34%;
      --hero-size: cover;
      --headline-size: 50rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }


    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 34rem;
      background: linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: 145rem;
      background: rgba(255, 255, 255, 0.025);
    }

    .stat {
      display: grid;
      align-content: center;
      gap: 16rem;
      padding-left: 36rem;
      border-right: 1rem solid rgba(255, 255, 255, 0.035);
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat span {
      color: rgba(255, 255, 255, 0.52);
      font-size: 28rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .stat strong {
      color: #fff;
      font-size: 35rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .card-copy {
      position: relative;
      min-height: 262rem;
      padding: 51rem 246rem 34rem 37rem;
      color: rgba(255, 255, 255, 0.94);
      font-size: 31rem;
      line-height: 1.62;
      font-weight: 650;
      letter-spacing: 0;
    }

    .spark {
      display: inline-block;
      margin-right: 16rem;
      font-size: 34rem;
      color: #fff;
      filter: drop-shadow(0 0 8rem rgba(255, 255, 255, 0.5));
    }

    .mini-route {
      position: absolute;
      right: 45rem;
      bottom: 35rem;
      width: 180rem;
      height: 170rem;
      opacity: 0.9;
    }

    .route-path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 3;
      stroke-dasharray: 7 8;
      stroke-linecap: round;
    }

    .route-dot {
      fill: #fff;
      stroke: rgba(255, 255, 255, 0.26);
      stroke-width: 12;
    }

    .route-tag {
      position: absolute;
      display: inline-grid;
      place-items: center;
      min-width: 68rem;
      height: 39rem;
      padding: 0 11rem;
      border-radius: 7rem;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.13);
      font-size: 25rem;
      line-height: 1;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0;
      transform: rotate(4deg);
    }

    .route-tag.first {
      top: 27rem;
      right: 0;
    }

    .route-tag.second {
      left: 26rem;
      bottom: 5rem;
      transform: rotate(-4deg);
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 959rem;
    }

    .note-label {
      margin: 0 0 26rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 31rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 31rem;
    }

    .quote {
      position: relative;
      min-height: 171rem;
      padding: 0 152rem 0 34rem;
      border-left: 2rem dashed rgba(255, 255, 255, 0.14);
    }

    .quote h2 {
      margin: 0 0 18rem;
      color: #fff;
      font-size: 35rem;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      position: absolute;
      left: -5rem;
      top: -10rem;
      color: rgba(255, 255, 255, 0.42);
      font-size: 56rem;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 29rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 0;
      top: 8rem;
      width: 121rem;
      height: 156rem;
      overflow: hidden;
      border-radius: 11rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }
  </style>
  <script src="./assets/feed-components.js" defer></script>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <feed-status></feed-status>

    <feed-top-nav active="推荐"></feed-top-nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">先把心动妆试到自己脸上</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="推荐摘要卡片">
        <div class="stat-grid">
          <div class="stat"><span>妆容</span><strong>玫瑰妆</strong></div>
          <div class="stat"><span>相似度</span><strong>86%</strong></div>
          <div class="stat"><span>对比</span><strong>双图</strong></div>
          <div class="stat"><span>步骤</span><strong>4步</strong></div>
        </div>
        <div class="card-copy">
          <span class="spark">✦</span>已把参考图与自拍叠画对齐，按底妆、眼影、腮红、唇线四步拆解，方便直接保存到练习册。
          <div class="mini-route" aria-hidden="true">
            <svg viewBox="0 0 180 170">
              <path class="route-path" d="M28 48 C76 30 110 51 116 77 S77 95 95 124 S135 130 152 112"></path>
              <circle class="route-dot" cx="28" cy="48" r="7"></circle>
              <circle class="route-dot" cx="116" cy="77" r="7"></circle>
              <circle class="route-dot" cx="95" cy="124" r="7"></circle>
              <circle class="route-dot" cx="152" cy="112" r="7"></circle>
            </svg>
            <span class="route-tag first">参考图</span>
            <span class="route-tag second">自拍</span>
          </div>
        </div>
      </article>

      <section class="creator-note" aria-label="美妆博主推荐">
        <p class="note-label">低饱和玫瑰妆</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>底妆明度拉平，先把脸颊和鼻梁的灰度统一。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-left.jpg')"></span>
              <span>步骤 01：肤色先干净，后续颜色才不显脏。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-01.png')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>眼影范围缩小，腮红位置上移，唇线边界柔化。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span>练习记录：低饱和玫瑰妆 4 步已生成。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-02.png')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <feed-progress fills="100,63,0,0,0"></feed-progress>

      <feed-actions label="推荐操作" primary="保存练习册" secondary="切换对比" order="secondary-primary"></feed-actions>

      <feed-swipe-tip text="上滑继续看推荐"></feed-swipe-tip>
    </section>

    <feed-bottom-nav></feed-bottom-nav>
    <feed-home-indicator></feed-home-indicator>
  </main>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!window.gsap) {
        document.documentElement.dataset.gsapLoaded = "false";
        return;
      }

      document.documentElement.dataset.gsapLoaded = "true";
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) {
        return;
      }

      gsap.from(".hero-grain", { scale: 1.08, duration: 1.1, ease: "power2.out" });
      gsap.from(".status-bar, .top-nav", { y: -16, autoAlpha: 0, duration: 0.42, stagger: 0.08, ease: "power3.out" });
      gsap.from(".headline", { y: 28, autoAlpha: 0, duration: 0.58, delay: 0.12, ease: "power3.out" });
      gsap.from(".info-card", { y: 34, autoAlpha: 0, duration: 0.64, delay: 0.24, ease: "power3.out" });
      gsap.from(".stat", { y: 16, autoAlpha: 0, duration: 0.42, delay: 0.42, stagger: 0.045, ease: "power2.out" });
      gsap.from(".quote", { x: -18, autoAlpha: 0, duration: 0.5, delay: 0.48, stagger: 0.09, ease: "power3.out" });
      gsap.from(".progress span, .action-button, .swipe-tip", { y: 16, duration: 0.42, delay: 0.66, stagger: 0.04, ease: "power2.out" });
      gsap.from(".bottom-link", { y: 16, duration: 0.38, delay: 0.72, stagger: 0.035, ease: "power2.out" });
      gsap.to(".route-dot", { scale: 1.25, transformOrigin: "50% 50%", duration: 0.9, repeat: -1, yoyo: true, stagger: 0.12, ease: "sine.inOut" });
      gsap.to(".chevrons", { y: -7, duration: 0.9, repeat: -1, yoyo: true, ease: "sine.inOut" });

      document.querySelectorAll("button, .bottom-link").forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(item, { scale: 0.96 }, { scale: 1, duration: 0.32, ease: "back.out(2.4)" });
        });
      });
    });
  </script>
</body>
</html>
