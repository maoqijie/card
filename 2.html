  <title>Face Muse - 眉眼先稳住，再谈精修</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-2-hero-feed.webp");
      --hero-position: 51% 43%;
      --hero-size: cover;
      --headline-size: 57rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.28) 0%, rgba(0, 0, 0, 0.06) 21%, rgba(7, 78, 43, 0.28) 47%, rgba(2, 47, 27, 0.9) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes hero-breathe {
      from { transform: scale(1.015); }
      to { transform: scale(1.045); }
    }

    .status-bar {
      position: absolute;
      top: 44rem;
      left: 80rem;
      right: 39rem;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 34rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .signal {
      display: flex;
      align-items: end;
      gap: 5rem;
      width: 42rem;
      height: 31rem;
    }

    .signal span {
      width: 7rem;
      border-radius: 7rem;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 12rem; }
    .signal span:nth-child(2) { height: 18rem; }
    .signal span:nth-child(3) { height: 25rem; }
    .signal span:nth-child(4) { height: 31rem; }

    .wifi {
      position: relative;
      width: 39rem;
      height: 31rem;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 6rem solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 1rem;
      width: 36rem;
      height: 36rem;
    }

    .wifi::after {
      top: 11rem;
      width: 18rem;
      height: 18rem;
    }

    .wifi i {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    .battery {
      position: relative;
      width: 51rem;
      height: 28rem;
      border: 3rem solid rgba(255, 255, 255, 0.92);
      border-radius: 7rem;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 5rem 7rem;
      border-radius: 3rem;
      background: #fff;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8rem;
      top: 8rem;
      width: 4rem;
      height: 11rem;
      border-radius: 0 4rem 4rem 0;
      background: rgba(255, 255, 255, 0.86);
    }

    .top-nav {
      position: absolute;
      top: 127rem;
      left: 38rem;
      right: 38rem;
      z-index: 4;
      display: grid;
      grid-template-columns: 58rem 1fr 58rem;
      align-items: center;
      gap: 24rem;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 58rem;
      height: 58rem;
      border: 0;
      padding: 0;
      color: #fff;
      background: transparent;
      cursor: pointer;
    }

    .icon-button svg {
      width: 54rem;
      height: 54rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .channels {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, max-content);
      justify-content: space-between;
      align-items: center;
      gap: 15rem;
      color: rgba(255, 255, 255, 0.54);
      font-size: 31rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;

    .channel {
      position: relative;
      white-space: nowrap;
    }

    .channel.active {
      color: #fff;
      font-size: 39rem;
      text-shadow: 0 4rem 18rem rgba(0, 0, 0, 0.24);
    }

    .channel.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24rem;
      width: 70rem;
      height: 5rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 369rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    h1 {

      margin: 0;
      color: #fff;
      font-size: var(--headline-size);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, 0.42);

    .ai-badge {
      flex: 0 0 auto;
      padding: 11rem 16rem 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.28);
      border-radius: 8rem;

    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 486rem;
      height: 404rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 28rem;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.09), transparent 31%),
        linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .info-card-image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .scan-stage {
      position: relative;
      height: 255rem;
      overflow: hidden;
      isolation: isolate;
    }

    .scan-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 38%, rgba(0, 0, 0, 0.46)),
        linear-gradient(90deg, rgba(8, 45, 29, 0.4), transparent 32%, rgba(8, 45, 29, 0.25));
      pointer-events: none;
    }

    .scan-status {
      position: absolute;
      left: 18rem;
      right: 18rem;
      top: 16rem;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9rem;
    }

    .scan-pill {
      height: 38rem;
      display: grid;
      place-items: center;
      padding: 0 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 10rem;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(0, 0, 0, 0.34);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      white-space: nowrap;
      backdrop-filter: blur(8rem);
    }

    .scan-tags {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .scan-tag {
      position: absolute;
      display: inline-grid;
      grid-template-columns: 12rem auto;
      align-items: center;
      gap: 7rem;
      min-width: 112rem;
      height: 39rem;
      padding: 0 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.2);
      border-radius: 11rem;
      color: rgba(255, 255, 255, 0.76);
      background: rgba(16, 59, 39, 0.68);
      box-shadow: 0 8rem 22rem rgba(0, 0, 0, 0.22);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
      transition: transform 0.2s ease, color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .scan-tag::before {
      content: "";
      width: 12rem;
      height: 12rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 0 0 6rem rgba(255, 255, 255, 0.12);
    }

    .scan-tag.is-active {
      color: #fff;
      background: rgba(92, 132, 91, 0.82);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-3rem);
    }

    .scan-tag.is-active::before {
      background: #fff;
      box-shadow: 0 0 0 7rem rgba(255, 255, 255, 0.22), 0 0 18rem rgba(255, 255, 255, 0.52);
    }

    .scan-tag.peak {
      left: 125rem;
      top: 88rem;
    }

    .scan-tag.tail {
      left: 354rem;
      top: 127rem;
    }

    .scan-tag.lash {
      right: 54rem;
      bottom: 54rem;
    }

    .scan-line {
      position: absolute;
      left: 74rem;
      right: 74rem;
      top: 126rem;
      z-index: 2;
      height: 2rem;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      box-shadow: 0 0 16rem rgba(255, 255, 255, 0.35);
      animation: scan-line 2.2s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .coach-panel {
      position: relative;
      min-height: 149rem;
      padding: 14rem 18rem 16rem;
      border-top: 1rem solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(12, 55, 36, 0.54), rgba(4, 28, 19, 0.64)),
        rgba(0, 0, 0, 0.18);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8rem;
      margin-bottom: 11rem;
    }

    .mode-tab {
      height: 42rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 10rem;
      color: rgba(255, 255, 255, 0.62);
      background: rgba(255, 255, 255, 0.06);
      font-size: 20rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .mode-tab.is-active {
      color: rgba(31, 65, 43, 0.96);
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.9);
    }

    .mode-tab:active {
      transform: scale(0.96);
    }

    .coach-copy {
      min-height: 0;
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 22rem;
      line-height: 1.28;
      font-weight: 650;
      letter-spacing: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .solution-map {
      position: relative;
      display: grid;
      grid-template-rows: 100rem 108rem;
      gap: 14rem;
      padding: 18rem 24rem 23rem;
    }

    .camera-track {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 14rem;
      min-width: 0;
    }

    .map-label {
      display: inline-flex;
      align-items: center;
      width: max-content;
      height: 38rem;
      padding: 0 15rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(0, 0, 0, 0.12);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .track-stack {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9rem;
      min-width: 0;
    }

    .track-item {
      display: grid;
      align-content: center;
      gap: 7rem;
      min-height: 78rem;
      padding: 8rem 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.08);
      border-radius: 12rem;
      background: rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.9);
      font-size: 22rem;
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }

    .track-item:last-child {
      border-bottom: 1rem solid rgba(255, 255, 255, 0.08);
    }

    .track-item span {
      display: inline-grid;
      place-items: center;
      width: max-content;
      height: 27rem;
      padding: 0 9rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.11);
      font-size: 18rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .voice-guide {
      position: relative;
      min-height: 108rem;
      padding: 14rem 126rem 13rem 18rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 16rem;
      background: rgba(255, 255, 255, 0.06);
    }

    .voice-wave {
      position: absolute;
      right: 27rem;
      top: 15rem;
      width: 78rem;
      height: 78rem;
      border: 1rem solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.34) 0 12%, transparent 13% 26%, rgba(255, 255, 255, 0.15) 27% 29%, transparent 30% 45%, rgba(255, 255, 255, 0.1) 46% 49%, transparent 50%),
        rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 24rem rgba(0, 0, 0, 0.18);
      animation: voice-pulse 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    .voice-wave::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4rem;
      height: 24rem;
      border-radius: 999rem;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: -13rem 5rem 0 rgba(255, 255, 255, 0.64), 13rem -5rem 0 rgba(255, 255, 255, 0.64);
    }

    .voice-wave::after {
      content: "";
      position: absolute;
      inset: 13rem;
      border: 2rem solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      box-shadow: 0 0 18rem rgba(255, 255, 255, 0.42);
    }

    .guide-value {
      position: absolute;
      right: 43rem;
      top: 38rem;
      color: #fff;
      font-size: 24rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .guide-copy {
      margin: 9rem 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 23rem;
      line-height: 1.32;
      font-weight: 650;
      letter-spacing: 0;
    }

    .voice-icon {
      display: inline-grid;
      place-items: center;
      width: 26rem;
      height: 26rem;
      margin-right: 8rem;
      border-radius: 50%;
      color: rgba(41, 78, 48, 0.9);
      background: rgba(255, 255, 255, 0.86);
      font-size: 16rem;
      line-height: 1;
      font-weight: 900;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 1040rem;
    }

    .note-label {
      margin: 0 0 14rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 29rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 14rem;
    }

    .quote {
      position: relative;
      min-height: 144rem;
      padding: 16rem 138rem 15rem 22rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.11);
      border-radius: 18rem;
      background: rgba(255, 255, 255, 0.075);
      backdrop-filter: blur(10rem);
    }

    .quote h2 {

      font-size: 27rem;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      display: inline-grid;
      place-items: center;
      width: max-content;
      min-width: 48rem;
      height: 29rem;
      margin-bottom: 8rem;
      padding: 0 12rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.12);
      font-size: 19rem;
      line-height: 1;
      font-family: inherit;
      font-weight: 900;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 22rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {

      height: 35rem;

    .thumb::after {
      content: "";

      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {

      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);

      content: "";

      height: 0;

      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    .progress {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1554rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10rem;
    }

    .progress span {
      position: relative;
      height: 6rem;
      overflow: hidden;
      border-radius: 999rem;
      background: rgba(255, 255, 255, 0.16);
    }

    .progress span::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--fill, 0%);
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.68);

    .action-row {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1595rem;

      grid-template-columns: 1fr 1fr;
      gap: 20rem;
    }

    .action-button {
      height: 99rem;
      border: 0;
      border-radius: 17rem;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(99, 139, 97, 0.72);
      font-size: 34rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      backdrop-filter: blur(8rem);
      transition: transform 0.18s ease;
    }

    .action-button.secondary {
      color: rgba(255, 255, 255, 0.55);
      background: rgba(93, 138, 93, 0.44);
    }

    .action-button:active,
    .icon-button:active,
    .bottom-link:active {
      transform: scale(0.96);
    }

    .swipe-tip {
      position: absolute;
      left: 0;
      right: 0;
      top: 1704rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10rem;
      color: rgba(255, 255, 255, 0.53);
      font-size: 23rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chevrons {
      position: relative;
      width: 21rem;
      height: 21rem;
      animation: chevron-rise 0.9s ease-in-out infinite alternate;
      will-change: transform;
    }

    .chevrons::before,
    .chevrons::after {
      content: "";
      position: absolute;
      left: 4rem;
      width: 13rem;
      height: 13rem;
      border-left: 3rem solid rgba(255, 255, 255, 0.55);
      border-top: 3rem solid rgba(255, 255, 255, 0.55);
      transform: rotate(45deg);
    }

    .chevrons::before { top: 5rem; }
    .chevrons::after { top: -2rem; opacity: 0.7; }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      height: 190rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1.08fr 1fr 1fr;
      align-items: start;
      padding: 35rem 34rem 0;
      background: #000;
      box-shadow: 0 -20rem 40rem rgba(0, 0, 0, 0.22);
    }

    .bottom-link {
      display: grid;
      justify-items: center;
      gap: 11rem;
      color: rgba(255, 255, 255, 0.46);
      text-decoration: none;
      font-size: 33rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 0.18s ease;
    }

    .bottom-link.active {
      color: #fff;
    }

    .plus-button {
      display: grid;
      place-items: center;
      justify-self: center;
      width: 82rem;
      height: 58rem;
      margin-top: -9rem;
      border: 6rem solid #fff;
      border-radius: 20rem;
      color: #fff;
      background: #000;
      box-shadow: -5rem 0 0 #21f4ee, 5rem 0 0 #fe2c55;
    }

    .plus-button svg {
      width: 38rem;
      height: 38rem;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 17rem;
      z-index: 6;
      width: 298rem;
      height: 7rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, 0.8);
      outline-offset: 5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @keyframes voice-pulse {
      from { transform: scale(0.96); }
      to { transform: scale(1.04); }
    }

    @keyframes chevron-rise {
      from { transform: translateY(0); }
      to { transform: translateY(-7rem); }
    }

    @keyframes scan-line {
      from { transform: translateY(-42rem); opacity: 0.42; }
      to { transform: translateY(48rem); opacity: 0.82; }
    }
  </style>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <div class="system-icons">
        <span class="signal"><span></span><span></span><span></span><span></span></span>
        <span class="wifi"><i></i></span>
        <span class="battery"></span>
      </div>
    </div>

    <nav class="top-nav" aria-label="频道导航">
      <button class="icon-button" type="button" aria-label="打开菜单">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M7 14h34M7 24h34M7 34h34"></path></svg>
      </button>
      <div class="channels" aria-label="内容频道">
        <span class="channel">团购</span>
        <span class="channel">经验</span>
        <span class="channel">北京</span>
        <span class="channel">关注</span>
        <span class="channel">商城</span>
        <span class="channel active">推荐</span>
      </div>
      <button class="icon-button" type="button" aria-label="搜索">
        <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="21" cy="21" r="13"></circle><path d="M31.5 31.5 42 42"></path></svg>
      </button>
    </nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">眉眼先稳住，再谈精修</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="AI 眉眼实时校准卡">
        <div class="scan-stage">
          <img class="info-card-image" src="./assets/face-muse-2-brow-coach-card.jpg" width="900" height="458" alt="AI 眉妆教练识别眉笔、眉峰和眉尾的横版相机示意图" loading="eager" decoding="async">
          <div class="scan-status" aria-label="当前检测状态">
            <span class="scan-pill">实时校准中</span>
            <span class="scan-pill">镜框距离偏近</span>
            <span class="scan-pill">建议力度 -30%</span>
          </div>
          <div class="scan-tags" aria-hidden="true">
            <span class="scan-tag peak is-active" data-tag="position">眉峰定位</span>
            <span class="scan-tag tail" data-tag="fill">眉尾空隙 2mm</span>
            <span class="scan-tag lash" data-tag="review">睫毛角度 42°</span>
          </div>
          <span class="scan-line" aria-hidden="true"></span>
        </div>

        <div class="coach-panel">
          <div class="mode-tabs" role="group" aria-label="眉眼校准模式">
            <button class="mode-tab is-active" type="button" aria-pressed="true" data-mode="position">定位</button>
            <button class="mode-tab" type="button" aria-pressed="false" data-mode="fill">补空</button>
            <button class="mode-tab" type="button" aria-pressed="false" data-mode="review">复查</button>
          </div>
          <p class="coach-copy" id="coach-copy">先把眉峰压在蓝线内，眉笔横向轻扫，保证两侧高度稳定后再补颜色。</p>
        </div>
      </article>

      <section class="creator-note" aria-label="实时指导">
        <p class="note-label">实时指导</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">AI 语音</span>
            <h2 id="primary-guidance">眉笔停在蓝线内，先定眉峰高度，不要急着拉长眉尾。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/face-muse-2-avatar.webp')"></span>
              <span id="voice-guidance">同步语音：从眉峰向外轻扫两笔，力度减半。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-lash.webp')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">镜头</span>
            <h2 id="secondary-guidance">镜头已锁定眉峰，保持脸部正对屏幕 2 秒。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span id="camera-guidance">画面自动放大眉峰，确认两侧高度差小于 1mm。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-brow.webp')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <div class="progress" aria-hidden="true">
        <span style="--fill: 100%"></span>
        <span style="--fill: 63%"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="action-row" aria-label="推荐操作">
        <button class="action-button secondary" type="button">切换对比</button>
        <button class="action-button" type="button">开始眉眼校准</button>
      </div>

      <div class="swipe-tip" aria-hidden="true">
        <span class="chevrons"></span>
        <span>上滑继续看推荐</span>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="bottom-link active" href="#" aria-current="page">首页</a>
      <a class="bottom-link" href="#">朋友</a>
      <a class="bottom-link" href="#" aria-label="发布">
        <span class="plus-button" aria-hidden="true">
          <svg viewBox="0 0 48 48"><path d="M24 10v28M10 24h28"></path></svg>
        </span>
      </a>
      <a class="bottom-link" href="#">消息</a>
      <a class="bottom-link" href="#">我</a>
    </nav>
    <span class="home-indicator" aria-hidden="true"></span>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const modes = {
        position: {
          copy: "先把眉峰压在蓝线内，眉笔横向轻扫，保证两侧高度稳定后再补颜色。",
          primary: "眉笔停在蓝线内，先定眉峰高度，不要急着拉长眉尾。",
          voice: "同步语音：从眉峰向外轻扫两笔，力度减半。",
          secondary: "镜头已锁定眉峰，保持脸部正对屏幕 2 秒。",
          camera: "画面自动放大眉峰，确认两侧高度差小于 1mm。"
        },
        fill: {
          copy: "眉尾空隙还剩 2mm，先用短线补形，再用刷头把边缘扫开。",
          primary: "眉尾缺口在镜框上方，向外补两笔就停，不要继续加粗。",
          voice: "同步语音：笔尖抬高 15°，从空隙内侧往外带。",
          secondary: "AI 已避开镜框遮挡区，当前建议力度降低 30%。",
          camera: "画面自动跟踪眉尾，补色后会提示是否需要柔化。"
        },
        review: {
          copy: "眉尾完成后复查睫毛角度，夹子保持 42°，避免睫毛贴近镜片。",
          primary: "检测到睫毛贴近镜片，先复查夹翘角度，再进入眼线精修。",
          voice: "同步语音：夹子停在睫毛根部 1 秒，向上轻压。",
          secondary: "镜头已切到眼尾，睫毛与镜片距离恢复到安全范围。",
          camera: "画面自动放大眼尾，给出睫毛和镜框间距。"
        }
      };

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const tabs = Array.from(document.querySelectorAll(".mode-tab"));
      const tags = Array.from(document.querySelectorAll(".scan-tag"));
      const coachCopy = document.querySelector("#coach-copy");
      const primaryGuidance = document.querySelector("#primary-guidance");
      const voiceGuidance = document.querySelector("#voice-guidance");
      const secondaryGuidance = document.querySelector("#secondary-guidance");
      const cameraGuidance = document.querySelector("#camera-guidance");
      const infoCard = document.querySelector(".info-card");

      const setMode = (mode) => {
        const next = modes[mode] || modes.position;

        tabs.forEach((tab) => {
          const isActive = tab.dataset.mode === mode;
          tab.classList.toggle("is-active", isActive);
          tab.setAttribute("aria-pressed", String(isActive));
        });

        tags.forEach((tag) => tag.classList.toggle("is-active", tag.dataset.tag === mode));

        coachCopy.textContent = next.copy;
        primaryGuidance.textContent = next.primary;
        voiceGuidance.textContent = next.voice;
        secondaryGuidance.textContent = next.secondary;
        cameraGuidance.textContent = next.camera;

        if (!reduceMotion) {
          infoCard.animate(
            [{ transform: "translateY(0)" }, { transform: "translateY(-4rem)" }, { transform: "translateY(0)" }],
            { duration: 220, easing: "ease-out" }
          );
        }
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => setMode(tab.dataset.mode));
        tab.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          event.preventDefault();
          setMode(tab.dataset.mode);
        });
      });

      document.querySelectorAll("button, .bottom-link").forEach((item) => {
        item.addEventListener("click", (event) => {
          if (item.tagName === "A") {
            event.preventDefault();
          }

          if (reduceMotion) {
            return;
          }

          item.animate(
            [{ transform: "scale(0.96)" }, { transform: "scale(1)" }],
            { duration: 180, easing: "ease-out" }
          );
        });
      });
    });
  </script>
</body>
</html>
