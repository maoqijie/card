<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，帮化妆新手把眉眼位置先找稳，再做精修。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/face-muse-2-hero-feed.webp" fetchpriority="high">
  <link rel="preload" as="image" href="./assets/face-muse-2-lash.webp">
  <title>Face Muse - 眉眼先稳住，再谈精修</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-2-hero-feed.webp");
      --hero-position: 51% 43%;
      --hero-size: cover;
      --headline-size: 57rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes hero-breathe {
      from { transform: scale(1.015); }
      to { transform: scale(1.045); }
    }

    .status-bar {
      position: absolute;
      top: 44rem;
      left: 80rem;
      right: 39rem;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 34rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .signal {
      display: flex;
      align-items: end;
      gap: 5rem;
      width: 42rem;
      height: 31rem;
    }

    .signal span {
      width: 7rem;
      border-radius: 7rem;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 12rem; }
    .signal span:nth-child(2) { height: 18rem; }
    .signal span:nth-child(3) { height: 25rem; }
    .signal span:nth-child(4) { height: 31rem; }

    .wifi {
      position: relative;
      width: 39rem;
      height: 31rem;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 6rem solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 1rem;
      width: 36rem;
      height: 36rem;
    }

    .wifi::after {
      top: 11rem;
      width: 18rem;
      height: 18rem;
    }

    .wifi i {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    .battery {
      position: relative;
      width: 51rem;
      height: 28rem;
      border: 3rem solid rgba(255, 255, 255, 0.92);
      border-radius: 7rem;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 5rem 7rem;
      border-radius: 3rem;
      background: #fff;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8rem;
      top: 8rem;
      width: 4rem;
      height: 11rem;
      border-radius: 0 4rem 4rem 0;
      background: rgba(255, 255, 255, 0.86);
    }

    .top-nav {
      position: absolute;
      top: 127rem;
      left: 38rem;
      right: 38rem;
      z-index: 4;
      display: grid;
      grid-template-columns: 58rem 1fr 58rem;
      align-items: center;
      gap: 24rem;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 58rem;
      height: 58rem;
      border: 0;
      padding: 0;
      color: #fff;
      background: transparent;
      cursor: pointer;
    }

    .icon-button svg {
      width: 54rem;
      height: 54rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .channels {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, max-content);
      justify-content: space-between;
      align-items: center;
      gap: 15rem;
      color: rgba(255, 255, 255, 0.54);
      font-size: 31rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .channel {
      position: relative;
      white-space: nowrap;
    }

    .channel.active {
      color: #fff;
      font-size: 39rem;
      text-shadow: 0 4rem 18rem rgba(0, 0, 0, 0.24);
    }

    .channel.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24rem;
      width: 70rem;
      height: 5rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 397rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    h1 {
      flex: 1;
      margin: 0;
      color: #fff;
      font-size: var(--headline-size);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, 0.42);
    }

    .ai-badge {
      flex: 0 0 auto;
      padding: 11rem 16rem 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.28);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.08);
      font-size: 26rem;
      line-height: 1;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
    }

    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 34rem;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.09), transparent 31%),
        linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .info-card-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1.28fr 1fr 1fr;
      height: 104rem;
      padding: 18rem 24rem 0;
      gap: 12rem;
    }

    .stat {
      display: grid;
      align-content: center;
      gap: 10rem;
      min-width: 0;
      padding: 0 16rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 14rem;
      background: rgba(255, 255, 255, 0.07);
    }

    .stat span {
      color: rgba(255, 255, 255, 0.56);
      font-size: 24rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .stat strong {
      color: #fff;
      font-size: 31rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .solution-map {
      position: relative;
      display: grid;
      grid-template-rows: 100rem 108rem;
      gap: 14rem;
      padding: 18rem 24rem 23rem;
    }

    .camera-track {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 14rem;
      min-width: 0;
    }

    .map-label {
      display: inline-flex;
      align-items: center;
      width: max-content;
      height: 38rem;
      padding: 0 15rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(0, 0, 0, 0.12);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .track-stack {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9rem;
      min-width: 0;
    }

    .track-item {
      display: grid;
      align-content: center;
      gap: 7rem;
      min-height: 78rem;
      padding: 8rem 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.08);
      border-radius: 12rem;
      background: rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.9);
      font-size: 22rem;
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }

    .track-item:last-child {
      border-bottom: 1rem solid rgba(255, 255, 255, 0.08);
    }

    .track-item span {
      display: inline-grid;
      place-items: center;
      width: max-content;
      height: 27rem;
      padding: 0 9rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.11);
      font-size: 18rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .voice-guide {
      position: relative;
      min-height: 108rem;
      padding: 14rem 126rem 13rem 18rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 16rem;
      background: rgba(255, 255, 255, 0.06);
    }

    .voice-wave {
      position: absolute;
      right: 27rem;
      top: 15rem;
      width: 78rem;
      height: 78rem;
      border: 1rem solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.34) 0 12%, transparent 13% 26%, rgba(255, 255, 255, 0.15) 27% 29%, transparent 30% 45%, rgba(255, 255, 255, 0.1) 46% 49%, transparent 50%),
        rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 24rem rgba(0, 0, 0, 0.18);
      animation: voice-pulse 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    .voice-wave::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4rem;
      height: 24rem;
      border-radius: 999rem;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: -13rem 5rem 0 rgba(255, 255, 255, 0.64), 13rem -5rem 0 rgba(255, 255, 255, 0.64);
    }

    .voice-wave::after {
      content: "";
      position: absolute;
      inset: 13rem;
      border: 2rem solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      box-shadow: 0 0 18rem rgba(255, 255, 255, 0.42);
    }

    .guide-value {
      position: absolute;
      right: 43rem;
      top: 38rem;
      color: #fff;
      font-size: 24rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .guide-copy {
      margin: 9rem 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 23rem;
      line-height: 1.32;
      font-weight: 650;
      letter-spacing: 0;
    }

    .voice-icon {
      display: inline-grid;
      place-items: center;
      width: 26rem;
      height: 26rem;
      margin-right: 8rem;
      border-radius: 50%;
      color: rgba(41, 78, 48, 0.9);
      background: rgba(255, 255, 255, 0.86);
      font-size: 16rem;
      line-height: 1;
      font-weight: 900;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 940rem;
    }

    .note-label {
      margin: 0 0 18rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 29rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 18rem;
    }

    .quote {
      position: relative;
      min-height: 164rem;
      padding: 20rem 146rem 18rem 25rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.11);
      border-radius: 22rem;
      background: rgba(255, 255, 255, 0.075);
      backdrop-filter: blur(10rem);
    }

    .quote h2 {
      margin: 0 0 12rem;
      color: #fff;
      font-size: 30rem;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      display: inline-grid;
      place-items: center;
      width: 48rem;
      height: 31rem;
      margin-bottom: 10rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.12);
      font-size: 21rem;
      line-height: 1;
      font-family: inherit;
      font-weight: 900;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 25rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 20rem;
      top: 20rem;
      width: 112rem;
      height: 124rem;
      overflow: hidden;
      border-radius: 16rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    .progress {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1554rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10rem;
    }

    .progress span {
      position: relative;
      height: 6rem;
      overflow: hidden;
      border-radius: 999rem;
      background: rgba(255, 255, 255, 0.16);
    }

    .progress span::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--fill, 0%);
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.68);
    }

    .action-row {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1595rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20rem;
    }

    .action-button {
      height: 99rem;
      border: 0;
      border-radius: 17rem;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(99, 139, 97, 0.72);
      font-size: 34rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      backdrop-filter: blur(8rem);
      transition: transform 0.18s ease;
    }

    .action-button.secondary {
      color: rgba(255, 255, 255, 0.55);
      background: rgba(93, 138, 93, 0.44);
    }

    .action-button:active,
    .icon-button:active,
    .bottom-link:active {
      transform: scale(0.96);
    }

    .swipe-tip {
      position: absolute;
      left: 0;
      right: 0;
      top: 1732rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10rem;
      color: rgba(255, 255, 255, 0.53);
      font-size: 27rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chevrons {
      position: relative;
      width: 25rem;
      height: 25rem;
      animation: chevron-rise 0.9s ease-in-out infinite alternate;
      will-change: transform;
    }

    .chevrons::before,
    .chevrons::after {
      content: "";
      position: absolute;
      left: 5rem;
      width: 16rem;
      height: 16rem;
      border-left: 4rem solid rgba(255, 255, 255, 0.55);
      border-top: 4rem solid rgba(255, 255, 255, 0.55);
      transform: rotate(45deg);
    }

    .chevrons::before { top: 6rem; }
    .chevrons::after { top: -3rem; opacity: 0.7; }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      height: 190rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1.08fr 1fr 1fr;
      align-items: start;
      padding: 35rem 34rem 0;
      background: #000;
      box-shadow: 0 -20rem 40rem rgba(0, 0, 0, 0.22);
    }

    .bottom-link {
      display: grid;
      justify-items: center;
      gap: 11rem;
      color: rgba(255, 255, 255, 0.46);
      text-decoration: none;
      font-size: 33rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 0.18s ease;
    }

    .bottom-link.active {
      color: #fff;
    }

    .plus-button {
      display: grid;
      place-items: center;
      justify-self: center;
      width: 82rem;
      height: 58rem;
      margin-top: -9rem;
      border: 6rem solid #fff;
      border-radius: 20rem;
      color: #fff;
      background: #000;
      box-shadow: -5rem 0 0 #21f4ee, 5rem 0 0 #fe2c55;
    }

    .plus-button svg {
      width: 38rem;
      height: 38rem;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 17rem;
      z-index: 6;
      width: 298rem;
      height: 7rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, 0.8);
      outline-offset: 5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @keyframes voice-pulse {
      from { transform: scale(0.96); }
      to { transform: scale(1.04); }
    }

    @keyframes chevron-rise {
      from { transform: translateY(0); }
      to { transform: translateY(-7rem); }
    }
  </style>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <div class="system-icons">
        <span class="signal"><span></span><span></span><span></span><span></span></span>
        <span class="wifi"><i></i></span>
        <span class="battery"></span>
      </div>
    </div>

    <nav class="top-nav" aria-label="频道导航">
      <button class="icon-button" type="button" aria-label="打开菜单">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M7 14h34M7 24h34M7 34h34"></path></svg>
      </button>
      <div class="channels" aria-label="内容频道">
        <span class="channel">团购</span>
        <span class="channel">经验</span>
        <span class="channel">北京</span>
        <span class="channel">关注</span>
        <span class="channel">商城</span>
