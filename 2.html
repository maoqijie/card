<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，帮化妆新手把眉眼位置先找稳，再做精修。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/face-muse-2-hero-feed.webp" fetchpriority="high">
  <link rel="preload" as="image" href="./assets/face-muse-2-lash.webp">
  <link rel="stylesheet" href="./assets/feed-components.css">
  <title>Face Muse - 眉眼先稳住，再谈精修</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-2-hero-feed.webp");
      --hero-position: 51% 43%;
      --hero-size: cover;
      --headline-size: 57rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / var(--hero-size) no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }


    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 34rem;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.09), transparent 31%),
        linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .info-card-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1.28fr 1fr 1fr;
      height: 104rem;
      padding: 18rem 24rem 0;
      gap: 12rem;
    }

    .stat {
      display: grid;
      align-content: center;
      gap: 10rem;
      min-width: 0;
      padding: 0 16rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 14rem;
      background: rgba(255, 255, 255, 0.07);
    }

    .stat span {
      color: rgba(255, 255, 255, 0.56);
      font-size: 24rem;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .stat strong {
      color: #fff;
      font-size: 31rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .solution-map {
      position: relative;
      display: grid;
      grid-template-rows: 100rem 108rem;
      gap: 14rem;
      padding: 18rem 24rem 23rem;
    }

    .camera-track {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 14rem;
      min-width: 0;
    }

    .map-label {
      display: inline-flex;
      align-items: center;
      width: max-content;
      height: 38rem;
      padding: 0 15rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(0, 0, 0, 0.12);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .track-stack {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9rem;
      min-width: 0;
    }

    .track-item {
      display: grid;
      align-content: center;
      gap: 7rem;
      min-height: 78rem;
      padding: 8rem 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.08);
      border-radius: 12rem;
      background: rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.9);
      font-size: 22rem;
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }

    .track-item:last-child {
      border-bottom: 1rem solid rgba(255, 255, 255, 0.08);
    }

    .track-item span {
      display: inline-grid;
      place-items: center;
      width: max-content;
      height: 27rem;
      padding: 0 9rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.11);
      font-size: 18rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .voice-guide {
      position: relative;
      min-height: 108rem;
      padding: 14rem 126rem 13rem 18rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 16rem;
      background: rgba(255, 255, 255, 0.06);
    }

    .voice-wave {
      position: absolute;
      right: 27rem;
      top: 15rem;
      width: 78rem;
      height: 78rem;
      border: 1rem solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.34) 0 12%, transparent 13% 26%, rgba(255, 255, 255, 0.15) 27% 29%, transparent 30% 45%, rgba(255, 255, 255, 0.1) 46% 49%, transparent 50%),
        rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 24rem rgba(0, 0, 0, 0.18);
      animation: voice-pulse 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    .voice-wave::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4rem;
      height: 24rem;
      border-radius: 999rem;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: -13rem 5rem 0 rgba(255, 255, 255, 0.64), 13rem -5rem 0 rgba(255, 255, 255, 0.64);
    }

    .voice-wave::after {
      content: "";
      position: absolute;
      inset: 13rem;
      border: 2rem solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      box-shadow: 0 0 18rem rgba(255, 255, 255, 0.42);
    }

    .guide-value {
      position: absolute;
      right: 43rem;
      top: 38rem;
      color: #fff;
      font-size: 24rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .guide-copy {
      margin: 9rem 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 23rem;
      line-height: 1.32;
      font-weight: 650;
      letter-spacing: 0;
    }

    .voice-icon {
      display: inline-grid;
      place-items: center;
      width: 26rem;
      height: 26rem;
      margin-right: 8rem;
      border-radius: 50%;
      color: rgba(41, 78, 48, 0.9);
      background: rgba(255, 255, 255, 0.86);
      font-size: 16rem;
      line-height: 1;
      font-weight: 900;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 940rem;
    }

    .note-label {
      margin: 0 0 18rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 29rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 18rem;
    }

    .quote {
      position: relative;
      min-height: 164rem;
      padding: 20rem 146rem 18rem 25rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.11);
      border-radius: 22rem;
      background: rgba(255, 255, 255, 0.075);
      backdrop-filter: blur(10rem);
    }

    .quote h2 {
      margin: 0 0 12rem;
      color: #fff;
      font-size: 30rem;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      display: inline-grid;
      place-items: center;
      width: 48rem;
      height: 31rem;
      margin-bottom: 10rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.12);
      font-size: 21rem;
      line-height: 1;
      font-family: inherit;
      font-weight: 900;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 25rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 20rem;
      top: 20rem;
      width: 112rem;
      height: 124rem;
      overflow: hidden;
      border-radius: 16rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    @keyframes voice-pulse {
      from { transform: scale(0.96); }
      to { transform: scale(1.04); }
    }
  </style>
  <script src="./assets/feed-components.js" defer></script>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <feed-status></feed-status>

    <feed-top-nav active="推荐"></feed-top-nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">眉眼先稳住，再谈精修</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="AI 眉妆指导示意图">
        <img class="info-card-image" src="./assets/face-muse-2-brow-coach-card.jpg" width="900" height="458" alt="AI 眉妆教练识别眉笔、眉峰和眉尾的横版相机示意图" loading="eager" decoding="async">
      </article>

      <section class="creator-note" aria-label="实时指导">
        <p class="note-label">实时指导</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">气泡</span>
            <h2>眉笔停在蓝线内，先补眉尾空隙，不要压到镜框。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/face-muse-2-avatar.webp')"></span>
              <span>同步语音：向外轻扫两笔，力度减半。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-lash.webp')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">镜头</span>
            <h2>检测到睫毛贴近镜片，夹子角度保持 42°。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span>画面自动放大眼尾，给出下一步落点。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-brow.webp')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <feed-progress fills="100,63,0,0,0"></feed-progress>

      <feed-actions label="推荐操作" primary="查看详情" secondary="不感兴趣" order="secondary-primary"></feed-actions>

      <feed-swipe-tip text="上滑继续看推荐"></feed-swipe-tip>
    </section>

    <feed-bottom-nav></feed-bottom-nav>
    <feed-home-indicator></feed-home-indicator>
  </main>

</body>
</html>
