<html lang="zh-CN">
<head>

  <title>Face Muse - 眉眼先稳住，再谈精修</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-2-hero-feed.webp");
      --hero-position: 51% 43%;
      --hero-size: cover;
      --headline-size: 57rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%);
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.28) 0%, rgba(0, 0, 0, 0.06) 21%, rgba(7, 78, 43, 0.28) 47%, rgba(2, 47, 27, 0.9) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--hero-position);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%);
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 288rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    .headline h1 {
      flex: 1;
      margin: 0;
      color: #fff;
      font-size: var(--headline-size);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, 0.42);
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      height: 43rem;
      margin-top: 18rem;
      padding: 0 18rem;
      border: 1rem solid rgba(255, 255, 255, 0.34);
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16rem);
      font-size: 22rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 392rem;
      height: 404rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 28rem;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.09), transparent 31%),
        linear-gradient(180deg, rgba(66, 112, 76, 0.64), rgba(18, 72, 43, 0.68));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .info-card-image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .scan-stage {
      position: relative;
      height: 255rem;
      overflow: hidden;
      isolation: isolate;
    }

    .scan-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 38%, rgba(0, 0, 0, 0.46)),
        linear-gradient(90deg, rgba(8, 45, 29, 0.4), transparent 32%, rgba(8, 45, 29, 0.25));
      pointer-events: none;
    }

    .scan-status {
      position: absolute;
      left: 18rem;
      right: 18rem;
      top: 16rem;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9rem;
    }

    .scan-pill {
      height: 38rem;
      display: grid;
      place-items: center;
      padding: 0 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 10rem;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(0, 0, 0, 0.34);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      white-space: nowrap;
      backdrop-filter: blur(8rem);
    }

    .scan-tags {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .scan-tag {
      position: absolute;
      display: inline-grid;
      grid-template-columns: 12rem auto;
      align-items: center;
      gap: 7rem;
      min-width: 112rem;
      height: 39rem;
      padding: 0 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.2);
      border-radius: 11rem;
      color: rgba(255, 255, 255, 0.76);
      background: rgba(16, 59, 39, 0.68);
      box-shadow: 0 8rem 22rem rgba(0, 0, 0, 0.22);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
      transition: transform 0.2s ease, color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .scan-tag::before {
      content: "";
      width: 12rem;
      height: 12rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 0 0 6rem rgba(255, 255, 255, 0.12);
    }

    .scan-tag.is-active {
      color: #fff;
      background: rgba(92, 132, 91, 0.82);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-3rem);
    }

    .scan-tag.is-active::before {
      background: #fff;
      box-shadow: 0 0 0 7rem rgba(255, 255, 255, 0.22), 0 0 18rem rgba(255, 255, 255, 0.52);
    }

    .scan-tag.peak {
      left: 125rem;
      top: 88rem;
    }

    .scan-tag.tail {
      left: 354rem;
      top: 127rem;
    }

    .scan-tag.lash {
      right: 54rem;
      bottom: 54rem;
    }

    .scan-line {
      position: absolute;
      left: 74rem;
      right: 74rem;
      top: 126rem;
      z-index: 2;
      height: 2rem;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.82), transparent);
      box-shadow: 0 0 16rem rgba(255, 255, 255, 0.35);
      animation: scan-line 2.2s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .coach-panel {
      position: relative;
      min-height: 149rem;
      padding: 14rem 18rem 16rem;
      border-top: 1rem solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(12, 55, 36, 0.54), rgba(4, 28, 19, 0.64)),
        rgba(0, 0, 0, 0.18);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8rem;
      margin-bottom: 11rem;
    }

    .mode-tab {
      height: 42rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 10rem;
      color: rgba(255, 255, 255, 0.62);
      background: rgba(255, 255, 255, 0.06);
      font-size: 20rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .mode-tab.is-active {
      color: rgba(31, 65, 43, 0.96);
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.9);
    }

    .mode-tab:active {
      transform: scale(0.96);
    }

    .coach-copy {
      min-height: 0;
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 22rem;
      line-height: 1.28;
      font-weight: 650;
      letter-spacing: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .solution-map {
      position: relative;
      display: grid;
      grid-template-rows: 100rem 108rem;
      gap: 14rem;
      padding: 18rem 24rem 23rem;
    }

    .camera-track {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 14rem;
      min-width: 0;
    }

    .map-label {
      display: inline-flex;
      align-items: center;
      width: max-content;
      height: 38rem;
      padding: 0 15rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(0, 0, 0, 0.12);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .track-stack {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9rem;
      min-width: 0;
    }

    .track-item {
      display: grid;
      align-content: center;
      gap: 7rem;
      min-height: 78rem;
      padding: 8rem 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.08);
      border-radius: 12rem;
      background: rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.9);
      font-size: 22rem;
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }

    .track-item:last-child {
      border-bottom: 1rem solid rgba(255, 255, 255, 0.08);
    }

    .track-item span {
      display: inline-grid;
      place-items: center;
      width: max-content;
      height: 27rem;
      padding: 0 9rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.11);
      font-size: 18rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .voice-guide {
      position: relative;
      min-height: 108rem;
      padding: 14rem 126rem 13rem 18rem;
      border: 1rem solid rgba(255, 255, 255, 0.1);
      border-radius: 16rem;
      background: rgba(255, 255, 255, 0.06);
    }

    .voice-wave {
      position: absolute;
      right: 27rem;
      top: 15rem;
      width: 78rem;
      height: 78rem;
      border: 1rem solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.34) 0 12%, transparent 13% 26%, rgba(255, 255, 255, 0.15) 27% 29%, transparent 30% 45%, rgba(255, 255, 255, 0.1) 46% 49%, transparent 50%),
        rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 24rem rgba(0, 0, 0, 0.18);
      animation: voice-pulse 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    .voice-wave::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4rem;
      height: 24rem;
      border-radius: 999rem;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: -13rem 5rem 0 rgba(255, 255, 255, 0.64), 13rem -5rem 0 rgba(255, 255, 255, 0.64);
    }

    .voice-wave::after {
      content: "";
      position: absolute;
      inset: 13rem;
      border: 2rem solid rgba(255, 255, 255, 0.34);
      border-radius: 50%;
      box-shadow: 0 0 18rem rgba(255, 255, 255, 0.42);
    }

    .guide-value {
      position: absolute;
      right: 43rem;
      top: 38rem;
      color: #fff;
      font-size: 24rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .guide-copy {
      margin: 9rem 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 23rem;
      line-height: 1.32;
      font-weight: 650;
      letter-spacing: 0;
    }

    .voice-icon {
      display: inline-grid;
      place-items: center;
      width: 26rem;
      height: 26rem;
      margin-right: 8rem;
      border-radius: 50%;
      color: rgba(41, 78, 48, 0.9);
      background: rgba(255, 255, 255, 0.86);
      font-size: 16rem;
      line-height: 1;
      font-weight: 900;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 890rem;
    }

    .note-label {
      margin: 0 0 14rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 29rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 14rem;
    }

    .quote {
      position: relative;
      min-height: 144rem;
      padding: 16rem 138rem 15rem 22rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.11);
      border-radius: 18rem;
      background: rgba(255, 255, 255, 0.075);
      backdrop-filter: blur(10rem);
    }

    .quote h2 {
      margin: 0 0 10rem;
      color: #fff;
      font-size: 27rem;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      display: inline-grid;
      place-items: center;
      width: max-content;
      min-width: 48rem;
      height: 29rem;
      margin-bottom: 8rem;
      padding: 0 12rem;
      border-radius: 999rem;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.12);
      font-size: 19rem;
      line-height: 1;
      font-family: inherit;
      font-weight: 900;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 22rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 17rem;
      top: 17rem;
      width: 105rem;
      height: 110rem;
      overflow: hidden;
      border-radius: 14rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    @keyframes voice-pulse {
      from { transform: scale(0.96); }
      to { transform: scale(1.04); }
    }

    @keyframes scan-line {
      from { transform: translateY(-42rem); opacity: 0.42; }
      to { transform: translateY(48rem); opacity: 0.82; }
    }

    .product-state-panel {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 1492rem;
      display: grid;
      gap: 16rem;
      padding: 20rem;
      border: 1rem solid rgba(255, 255, 255, 0.14);
      border-radius: 26rem;
      background: rgba(7, 35, 24, 0.58);
      box-shadow: 0 18rem 40rem rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(14rem);
    }

    .product-state-panel strong {
      color: #fff;
      font-size: 27rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .state-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10rem;
    }

    .state-button {
      height: 62rem;
      border: 1rem solid rgba(255, 255, 255, 0.13);
      border-radius: 16rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.08);
      font-size: 24rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      will-change: transform;
    }

    .state-button.is-active {
      color: rgba(21, 54, 34, 0.96);
      background: rgba(245, 215, 154, 0.94);
    }

    .state-note {
      min-height: 40rem;
      margin: 0;
      color: rgba(255, 255, 255, 0.62);
      font-size: 22rem;
      line-height: 1.35;
      font-weight: 650;
      letter-spacing: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
  <script src="./assets/gsap.min.js" defer></script>

<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <img class="hero-image" src="./assets/face-muse-2-hero-feed.webp" width="887" height="1920" alt="" aria-hidden="true" fetchpriority="high" loading="eager" decoding="async">
    <div class="hero-grain" aria-hidden="true"></div>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">眉眼先稳住，再谈精修</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="AI 眉眼实时校准卡">
        <div class="scan-stage">
          <img class="info-card-image" src="./assets/face-muse-2-brow-coach-card.jpg" width="900" height="458" alt="AI 眉妆教练识别眉笔、眉峰和眉尾的横版相机示意图" loading="eager" decoding="async">
          <div class="scan-status" aria-label="当前检测状态">
            <span class="scan-pill">实时校准中</span>
            <span class="scan-pill">镜框距离偏近</span>
            <span class="scan-pill">建议力度 -30%</span>
          </div>
          <div class="scan-tags" aria-hidden="true">
            <span class="scan-tag peak is-active" data-tag="position">眉峰定位</span>
            <span class="scan-tag tail" data-tag="fill">眉尾空隙 2mm</span>
            <span class="scan-tag lash" data-tag="review">睫毛角度 42°</span>
          </div>
          <span class="scan-line" aria-hidden="true"></span>
        </div>

        <div class="coach-panel">
          <div class="mode-tabs" role="group" aria-label="眉眼校准模式">
            <button class="mode-tab is-active" type="button" aria-pressed="true" data-mode="position">定位</button>
            <button class="mode-tab" type="button" aria-pressed="false" data-mode="fill">补空</button>
            <button class="mode-tab" type="button" aria-pressed="false" data-mode="review">复查</button>
          </div>
          <p class="coach-copy" id="coach-copy">先把眉峰压在蓝线内，眉笔横向轻扫，保证两侧高度稳定后再补颜色。</p>
        </div>
      </article>

      <section class="creator-note" aria-label="实时指导">
        <p class="note-label">实时指导</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">AI 语音</span>
            <h2 id="primary-guidance">眉笔停在蓝线内，先定眉峰高度，不要急着拉长眉尾。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/face-muse-2-avatar.webp')"></span>
              <span id="voice-guidance">同步语音：从眉峰向外轻扫两笔，力度减半。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-lash.webp')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">镜头</span>
            <h2 id="secondary-guidance">镜头已锁定眉峰，保持脸部正对屏幕 2 秒。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span id="camera-guidance">画面自动放大眉峰，确认两侧高度差小于 1mm。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/face-muse-2-brow.webp')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <section class="product-state-panel" aria-label="眉眼校准状态">
        <strong>眉眼校准状态</strong>
        <div class="state-actions">
          <button class="state-button is-active" type="button" data-state-mode="position" aria-pressed="true">定位</button>
          <button class="state-button" type="button" data-state-mode="fill" aria-pressed="false">补空</button>
          <button class="state-button" type="button" data-state-mode="review" aria-pressed="false">复查</button>
        </div>
        <p class="state-note" aria-live="polite">先把眉峰压在蓝线内，确保两侧高度稳定。</p>
      </section>
    </section>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const modes = {
        position: {
          copy: "先把眉峰压在蓝线内，眉笔横向轻扫，保证两侧高度稳定后再补颜色。",
          primary: "眉笔停在蓝线内，先定眉峰高度，不要急着拉长眉尾。",
          voice: "同步语音：从眉峰向外轻扫两笔，力度减半。",
          secondary: "镜头已锁定眉峰，保持脸部正对屏幕 2 秒。",
          camera: "画面自动放大眉峰，确认两侧高度差小于 1mm。"
        },
        fill: {
          copy: "眉尾空隙还剩 2mm，先用短线补形，再用刷头把边缘扫开。",
          primary: "眉尾缺口在镜框上方，向外补两笔就停，不要继续加粗。",
          voice: "同步语音：笔尖抬高 15°，从空隙内侧往外带。",
          secondary: "AI 已避开镜框遮挡区，当前建议力度降低 30%。",
          camera: "画面自动跟踪眉尾，补色后会提示是否需要柔化。"
        },
        review: {
          copy: "眉尾完成后复查睫毛角度，夹子保持 42°，避免睫毛贴近镜片。",
          primary: "检测到睫毛贴近镜片，先复查夹翘角度，再进入眼线精修。",
          voice: "同步语音：夹子停在睫毛根部 1 秒，向上轻压。",
          secondary: "镜头已切到眼尾，睫毛与镜片距离恢复到安全范围。",
          camera: "画面自动放大眼尾，给出睫毛和镜框间距。"
        }
      };

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const tabs = Array.from(document.querySelectorAll(".mode-tab"));
      const tags = Array.from(document.querySelectorAll(".scan-tag"));
      const coachCopy = document.querySelector("#coach-copy");
      const primaryGuidance = document.querySelector("#primary-guidance");
      const voiceGuidance = document.querySelector("#voice-guidance");
      const secondaryGuidance = document.querySelector("#secondary-guidance");
      const cameraGuidance = document.querySelector("#camera-guidance");
      const infoCard = document.querySelector(".info-card");
      const stateButtons = Array.from(document.querySelectorAll("[data-state-mode]"));
      const stateNote = document.querySelector(".state-note");
      const productStatePanel = document.querySelector(".product-state-panel");
      const heroImage = document.querySelector(".hero-image");
      const headline = document.querySelector(".headline");
      const quotes = Array.from(document.querySelectorAll(".quote"));
      const scanLine = document.querySelector(".scan-line");
      let hasGsap = Boolean(window.gsap && !reduceMotion);
      let introPlayed = false;

      const setText = (element, value) => {
        if (element) {
          element.textContent = value;
        }
      };

      const setMode = (mode) => {
        const next = modes[mode] || modes.position;

        tabs.forEach((tab) => {
          const isActive = tab.dataset.mode === mode;
          tab.classList.toggle("is-active", isActive);
          tab.setAttribute("aria-pressed", String(isActive));
        });

        stateButtons.forEach((button) => {
          const isActive = button.dataset.stateMode === mode;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        tags.forEach((tag) => tag.classList.toggle("is-active", tag.dataset.tag === mode));

        setText(coachCopy, next.copy);
        setText(primaryGuidance, next.primary);
        setText(voiceGuidance, next.voice);
        setText(secondaryGuidance, next.secondary);
        setText(cameraGuidance, next.camera);
        setText(stateNote, next.copy);

        if (hasGsap) {
          const activeTag = tags.find((tag) => tag.dataset.tag === mode);

          if (infoCard) {
            gsap.fromTo(infoCard, { y: -4 }, { y: 0, duration: 0.24, ease: "power2.out", overwrite: "auto" });
          }

          if (activeTag) {
            gsap.fromTo(activeTag, { scale: 0.94 }, { scale: 1, duration: 0.28, ease: "back.out(2)", overwrite: "auto" });
          }
        }
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => setMode(tab.dataset.mode));
        tab.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          event.preventDefault();
          setMode(tab.dataset.mode);
        });
      });

      stateButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.stateMode));
      });

      const playIntro = () => {
        if (!hasGsap || introPlayed) {
          return;
        }

        introPlayed = true;
        document.documentElement.dataset.gsapLoaded = "true";
        const intro = gsap.timeline({ defaults: { ease: "power3.out" } });

        if (heroImage) {
          intro.from(heroImage, { scale: 1.08, autoAlpha: 0.72, duration: 0.78, ease: "power2.out" });
        }

        if (headline) {
          intro.from(headline, { y: 30, autoAlpha: 0, duration: 0.48 }, "<0.08");
        }

        if (infoCard) {
          intro.from(infoCard, { y: 34, autoAlpha: 0, duration: 0.56 }, "<0.12");
        }

        if (tags.length > 0) {
          intro.from(tags, { y: 10, autoAlpha: 0, duration: 0.28, stagger: 0.045, ease: "power2.out" }, "<0.2");
        }

        if (quotes.length > 0) {
          intro.from(quotes, { x: -20, autoAlpha: 0, duration: 0.42, stagger: 0.07 }, "<0.2");
        }

        if (productStatePanel) {
          intro.from(productStatePanel, { y: 24, autoAlpha: 0, duration: 0.42 }, "<0.12");
        }

        if (scanLine) {
          gsap.to(scanLine, { y: 42, duration: 1.5, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }

        gsap.to(".scan-pill", { y: -4, duration: 1.45, delay: 0.8, repeat: -1, yoyo: true, stagger: 0.14, ease: "sine.inOut" });

        if (heroImage) {
          gsap.to(heroImage, { scale: 1.045, duration: 7, delay: 0.9, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }
      };

      const loadMotion = () => {
        if (reduceMotion) {
          document.documentElement.dataset.gsapLoaded = "reduced";
          return;
        }

        if (window.gsap) {
          hasGsap = true;
          playIntro();
          return;
        }

        if (document.querySelector("script[data-gsap-loader]")) {
          return;
        }

        const script = document.createElement("script");
        script.src = "./assets/gsap.min.js";
        script.async = true;
        script.dataset.gsapLoader = "true";
        script.onload = () => {
          hasGsap = Boolean(window.gsap && !reduceMotion);
          playIntro();
        };
        script.onerror = () => {
          document.documentElement.dataset.gsapLoaded = "false";
        };
        document.head.append(script);
      };

      requestAnimationFrame(loadMotion);

      document.querySelectorAll("button").forEach((item) => {
        item.addEventListener("click", (event) => {
          if (!hasGsap) {
            return;
          }

          gsap.fromTo(item, { scale: 0.96 }, { scale: 1, duration: 0.24, ease: "back.out(2.2)", overwrite: "auto" });
        });
      });
    });
  </script>
</body>
</html>
