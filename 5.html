<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 高分化妆师与妆造档案首页，提供附近高分化妆师、造型工作室推荐和个人妆造档案。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/face-muse-5-card-1.webp" fetchpriority="high">
  <link rel="preload" as="image" href="./assets/face-muse-5-card-2.webp">
  <link rel="preload" as="image" href="./assets/face-muse-5-archive-stack.webp">
  <title>Face Muse - 高分化妆师与妆造档案</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #fff;
      --muted: rgba(255, 255, 255, .56);
      --line: rgba(255, 255, 255, .18);
      --hero-image: url("./assets/face-muse-5-card-1.webp");
      --hero-position: 48% 37%;
      --headline-size: 50rem;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, .24) 0%, rgba(5, 61, 34, .28) 31%, rgba(3, 52, 30, .96) 78%, #03100b 100%);
    }
    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .34) 0%, rgba(0, 0, 0, .08) 21%, rgba(7, 78, 43, .34) 47%, rgba(2, 47, 27, .96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, .12), transparent 34%);
      backdrop-filter: saturate(.95);
    }
    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .32), transparent 20%, transparent 80%, rgba(0, 0, 0, .28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, .28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      overflow: hidden;
      filter: saturate(.86) contrast(1.04);
      transform: scale(1.02);
    }
    .hero-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scale(1.015);
      transform-origin: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, .08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, .12), transparent 20%),
        var(--hero-image) var(--hero-position) / cover no-repeat;
      animation: hero-breathe 7s 1.1s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes hero-breathe {
      from { transform: scale(1.015); }
      to { transform: scale(1.045); }
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 286rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    .headline h1 {
      flex: 1;
      margin: 0;
      color: #fff;
      font-size: var(--headline-size);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, .42);
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      height: 43rem;
      margin-top: 18rem;
      padding: 0 18rem;
      border: 1rem solid rgba(255, 255, 255, .34);
      border-radius: 999rem;
      color: rgba(255, 255, 255, .78);
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(16rem);
      font-size: 22rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .discover-panel {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 386rem;
      height: 352rem;
      display: grid;
      align-content: start;
      gap: 20rem;
      padding: 24rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, .16);
      border-radius: 34rem;
      background: linear-gradient(145deg, rgba(58, 105, 70, .68), rgba(15, 56, 39, .82));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, .2), inset 0 1rem 0 rgba(255, 255, 255, .12);
      backdrop-filter: blur(14rem);
    }
    .search-box {
      height: 82rem;
      display: grid;
      grid-template-columns: 44rem 1fr 112rem;
      align-items: center;
      gap: 15rem;
      padding: 0 20rem;
      border: 1rem solid rgba(255, 255, 255, .14);
      border-radius: 22rem;
      color: rgba(255, 255, 255, .78);
      background: rgba(255, 255, 255, .1);
      font-size: 28rem;
      line-height: 1;
      font-weight: 750;
      letter-spacing: 0;
    }
    .search-icon {
      width: 34rem;
      height: 34rem;
      border: 4rem solid rgba(255, 255, 255, .8);
      border-radius: 50%;
      position: relative;
    }
    .search-icon::after {
      content: "";
      position: absolute;
      right: -11rem;
      bottom: -8rem;
      width: 16rem;
      height: 4rem;
      border-radius: 999rem;
      background: rgba(255, 255, 255, .8);
      transform: rotate(45deg);
    }
    .search-action {
      display: grid;
      place-items: center;
      height: 48rem;
      border-radius: 14rem;
      color: #123323;
      background: rgba(255, 255, 255, .88);
      font-size: 24rem;
      font-weight: 900;
    }
    .match-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12rem;
    }
    .metric {
      min-height: 92rem;
      display: grid;
      align-content: center;
      gap: 8rem;
      padding: 0 18rem;
      border: 1rem solid rgba(255, 255, 255, .11);
      border-radius: 20rem;
      background: rgba(255, 255, 255, .075);
    }
    .metric strong {
      color: #fff;
      font-size: 38rem;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
    }
    .metric span {
      color: rgba(255, 255, 255, .55);
      font-size: 22rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10rem;
    }
    .filter-chips span {
      padding: 10rem 14rem;
      border: 1rem solid rgba(255, 255, 255, .12);
      border-radius: 14rem;
      color: rgba(255, 255, 255, .72);
      background: rgba(255, 255, 255, .08);
      font-size: 22rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .studio-board {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 778rem;
      display: grid;
      gap: 18rem;
    }
    .note-label {
      margin: 0;
      color: rgba(255, 255, 255, .62);
      font-size: 30rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }
    .studio-card {
      position: relative;
      min-height: 182rem;
      display: grid;
      grid-template-columns: 168rem 1fr;
      gap: 20rem;
      padding: 16rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, .14);
      border-radius: 28rem;
      background: rgba(255, 255, 255, .085);
      box-shadow: 0 16rem 38rem rgba(0, 0, 0, .18);
      backdrop-filter: blur(12rem);
    }
    .studio-card.primary {
      min-height: 205rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, .14), rgba(255, 255, 255, .06));
    }
    .studio-card.is-selected,
    .archive-card.is-selected {
      border-color: rgba(245, 215, 154, .56);
      box-shadow: 0 18rem 42rem rgba(0, 0, 0, .2), 0 0 0 2rem rgba(245, 215, 154, .12);
    }
    .studio-photo {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-radius: 20rem;
      background: var(--photo) center / cover no-repeat;
    }
    .studio-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 52%, rgba(0, 0, 0, .4));
    }
    .studio-badge {
      position: absolute;
      left: 13rem;
      bottom: 13rem;
      z-index: 1;
      padding: 8rem 11rem;
      border-radius: 12rem;
      color: #fff;
      background: rgba(0, 0, 0, .32);
      font-size: 19rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
    }
    .studio-copy {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 12rem;
      padding: 4rem 2rem 0 0;
    }
    .studio-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12rem;
    }
    .studio-title h2 {
      margin: 0;
      color: #fff;
      font-size: 31rem;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
    }
    .studio-title span {
      flex: 0 0 auto;
      padding: 8rem 10rem;
      border-radius: 12rem;
      color: rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .11);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }
    .studio-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10rem;
      color: rgba(255, 255, 255, .56);
      font-size: 23rem;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }
    .style-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 9rem;
    }
    .style-tags span {
      padding: 8rem 10rem;
      border-radius: 12rem;
      color: rgba(255, 255, 255, .7);
      background: rgba(255, 255, 255, .08);
      font-size: 20rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .archive-card {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 1254rem;
      height: 158rem;
      display: grid;
      grid-template-columns: 1fr 186rem;
      gap: 18rem;
      padding: 18rem 20rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, .14);
      border-radius: 28rem;
      background: rgba(6, 28, 22, .5);
      backdrop-filter: blur(12rem);
    }
    .archive-copy {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 10rem;
    }
    .archive-copy h2 {
      margin: 0;
      color: #fff;
      font-size: 30rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }
    .archive-copy p {
      margin: 0;
      color: rgba(255, 255, 255, .6);
      font-size: 22rem;
      line-height: 1.3;
      font-weight: 650;
      letter-spacing: 0;
    }
    .archive-stats {
      display: flex;
      gap: 10rem;
    }
    .archive-stats span {
      padding: 8rem 11rem;
      border-radius: 12rem;
      color: rgba(255, 255, 255, .76);
      background: rgba(255, 255, 255, .09);
      font-size: 20rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }
    .archive-image {
      min-width: 0;
      border-radius: 20rem;
      background: url("./assets/face-muse-5-archive-stack.webp") center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, .22);
    }

    .demo-panel {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 1496rem;
      display: grid;
      gap: 14rem;
      padding: 20rem;
      border: 1rem solid rgba(255, 255, 255, .14);
      border-radius: 26rem;
      background: rgba(7, 35, 24, .58);
      box-shadow: 0 18rem 40rem rgba(0, 0, 0, .18);
      backdrop-filter: blur(14rem);
    }

    .demo-panel strong {
      color: #fff;
      font-size: 27rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .demo-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10rem;
    }

    .demo-button {
      height: 62rem;
      border: 1rem solid rgba(255, 255, 255, .13);
      border-radius: 16rem;
      color: rgba(255, 255, 255, .72);
      background: rgba(255, 255, 255, .08);
      font-size: 23rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
    }

    .demo-button.is-active {
      color: rgba(21, 54, 34, .96);
      background: rgba(245, 215, 154, .94);
    }

    .demo-note {
      min-height: 40rem;
      margin: 0;
      color: rgba(255, 255, 255, .62);
      font-size: 22rem;
      line-height: 1.35;
      font-weight: 650;
      letter-spacing: 0;
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, .8);
      outline-offset: 5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">高分化妆师与妆造档案</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="discover-panel" aria-label="化妆师搜索与筛选">
        <div class="search-box" aria-label="搜索化妆师、工作室或风格">
          <span class="search-icon" aria-hidden="true"></span>
          <span>化妆师 / 工作室 / 风格</span>
          <span class="search-action">搜索</span>
        </div>
        <div class="match-metrics">
          <div class="metric"><strong>92</strong><span>匹配度</span></div>
          <div class="metric"><strong>4.8</strong><span>最低评分</span></div>
          <div class="metric"><strong>1.6km</strong><span>最近距离</span></div>
        </div>
        <div class="filter-chips" aria-label="筛选条件">
          <span>人流热度</span>
          <span>附近可约</span>
          <span>韩系妆容</span>
          <span>新娘妆造</span>
          <span>妆面定制</span>
        </div>
      </article>

      <section class="studio-board" aria-label="推荐化妆师与工作室">
        <p class="note-label">附近高匹配工作室</p>
        <article class="studio-card primary">
          <div class="studio-photo" style="--photo: url('./assets/face-muse-5-card-1.webp')" aria-hidden="true">
            <span class="studio-badge">高口碑</span>
          </div>
          <div class="studio-copy">
            <div class="studio-title">
              <h2>云朵造型工作室</h2>
              <span>1.6km</span>
            </div>
            <div class="studio-meta">
              <span>4.8 分</span><span>约妆 126 次</span><span>匹配 92</span>
            </div>
            <div class="style-tags">
              <span>清新自然</span><span>韩系妆容</span><span>新娘妆造</span>
            </div>
          </div>
        </article>
        <article class="studio-card">
          <div class="studio-photo" style="--photo: url('./assets/face-muse-5-card-2.webp')" aria-hidden="true">
            <span class="studio-badge">新手友好</span>
          </div>
          <div class="studio-copy">
            <div class="studio-title">
              <h2>Lin 私人化妆间</h2>
              <span>2.4km</span>
            </div>
            <div class="studio-meta">
              <span>跟妆好评 92%</span><span>可做妆面定制</span>
            </div>
            <div class="style-tags">
              <span>日常妆容</span><span>氛围感妆</span><span>妆面定制</span>
            </div>
          </div>
        </article>
      </section>

      <section class="archive-card" aria-label="我的妆造档案">
        <div class="archive-copy">
          <h2>我的妆造档案</h2>
          <p>每次试妆都会沉淀到个人档案里，让推荐越来越准。</p>
          <div class="archive-stats">
            <span>7 次历史妆造</span>
            <span>3 条避坑建议</span>
          </div>
        </div>
        <div class="archive-image" aria-hidden="true"></div>
      </section>

      <section class="demo-panel" aria-label="匹配状态操作">
        <strong>妆造匹配状态</strong>
        <div class="demo-actions">
          <button class="demo-button is-active" type="button" data-demo-action="match" aria-pressed="true">重新匹配</button>
          <button class="demo-button" type="button" data-demo-action="studio" aria-pressed="false">锁定工作室</button>
          <button class="demo-button" type="button" data-demo-action="archive" aria-pressed="false">查看档案</button>
        </div>
        <p class="demo-note" aria-live="polite">根据距离、评分和历史妆造偏好，实时更新推荐顺序。</p>
      </section>
    </section>
  </main>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const notes = {
        match: "根据距离、评分和历史妆造偏好，实时更新推荐顺序。",
        studio: "已锁定云朵造型工作室，推荐理由会同步到当前卡片。",
        archive: "妆造档案记录 7 次历史妆造和 3 条避坑建议。"
      };
      const note = document.querySelector(".demo-note");
      const primaryStudio = document.querySelector(".studio-card.primary");
      const archiveCard = document.querySelector(".archive-card");
      const actionButtons = Array.from(document.querySelectorAll("[data-demo-action]"));
      const setDemo = (action) => {
        actionButtons.forEach((button) => {
          const isActive = button.dataset.demoAction === action;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
        if (note) {
          note.textContent = notes[action] || notes.match;
        }
        primaryStudio?.classList.toggle("is-selected", action === "studio");
        archiveCard?.classList.toggle("is-selected", action === "archive");
      };

      actionButtons.forEach((button) => {
        button.addEventListener("click", () => setDemo(button.dataset.demoAction));
      });

      if (!window.gsap) {
        document.documentElement.dataset.gsapLoaded = "false";
        return;
      }
      document.documentElement.dataset.gsapLoaded = "true";

      const find = (selector) => Array.from(document.querySelectorAll(selector));
      const present = (...items) => items.flat().filter(Boolean);
      const targets = {
        hero: document.querySelector(".hero-grain"),
        headline: document.querySelector(".headline"),
        discover: document.querySelector(".discover-panel"),
        studios: find(".studio-card"),
        archive: archiveCard,
        demo: document.querySelector(".demo-panel"),
        pressables: find("button, .studio-card, .archive-card")
      };
      const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const entranceTargets = present(targets.headline, targets.discover, targets.studios, targets.archive, targets.demo);

      if (reduceMotion) {
        if (entranceTargets.length) {
          gsap.set(entranceTargets, { autoAlpha: 1, clearProps: "transform" });
        }
        return;
      }

      if (targets.hero) {
        gsap.from(targets.hero, { scale: 1.08, duration: 1.1, ease: "power2.out" });
        gsap.to(targets.hero, { scale: 1.045, duration: 7, repeat: -1, yoyo: true, ease: "sine.inOut" });
      }
      if (targets.headline) {
        gsap.from(targets.headline, { y: 28, autoAlpha: 0, duration: 0.58, delay: 0.12, ease: "power3.out" });
      }
      if (targets.discover) {
        gsap.from(targets.discover, { y: 34, autoAlpha: 0, duration: 0.64, delay: 0.24, ease: "power3.out" });
      }
      if (targets.studios.length) {
        gsap.from(targets.studios, { x: -22, autoAlpha: 0, duration: 0.5, delay: 0.44, stagger: 0.08, ease: "power3.out" });
      }
      if (targets.archive) {
        gsap.from(targets.archive, { y: 18, autoAlpha: 0, duration: 0.42, delay: 0.62, ease: "power2.out" });
      }
      if (targets.demo) {
        gsap.from(targets.demo, { y: 18, autoAlpha: 0, duration: 0.38, delay: 0.7, ease: "power2.out" });
      }

      targets.pressables.forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(item, { scale: 0.94 }, { scale: 1, duration: 0.34, ease: "back.out(2.2)" });
        });
      });
    });
  </script>
</body>
</html>
