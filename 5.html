<html lang="zh-CN">
<head>

  <title>Face Muse - 高分化妆师与妆造档案</title>
  <style>
    :root {
      --design-width: 1152;
      --design-height: 2048;
      --page-bg: #06130f;
      --ink: #18201c;
      --cream: #fff9ef;
      --cream-2: #f5ecdf;
      --muted: #8b7c69;
      --gold: #eac494;
      --gold-2: #d88f34;
      --green: #08241e;
      --green-2: #12392f;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    html {
      font-size: calc(min(100vw, 1152px) / 1152);
    }

    body {
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .screen {
      position: relative;
      width: min(100vw, 1152px);
      height: auto;
      min-height: 2048rem;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 26% 20%, rgba(45, 91, 66, 0.38), transparent 22%),
        radial-gradient(circle at 82% 35%, rgba(71, 90, 63, 0.28), transparent 24%),
        linear-gradient(180deg, #04100e 0%, #0c241e 43%, #042019 100%);
      color: #fff4e7;
    }

    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .screen::before {
      background:
        linear-gradient(180deg, rgba(2, 9, 8, 0.92) 0%, rgba(2, 12, 10, 0.28) 18%, transparent 39%),
        linear-gradient(0deg, rgba(1, 16, 13, 0.95) 0%, rgba(1, 24, 19, 0.55) 18%, transparent 42%);
      mix-blend-mode: multiply;
    }

    .screen::after {
      background:
        radial-gradient(ellipse at center, transparent 45%, rgba(0, 8, 7, 0.42) 100%),
        linear-gradient(90deg, rgba(0, 16, 13, 0.2), transparent 15%, transparent 85%, rgba(0, 16, 13, 0.2));
    }

    .map-backdrop {
      position: absolute;
      inset: 0 0 auto 0;
      height: 980rem;
      z-index: 1;
      overflow: hidden;
      background:
        radial-gradient(circle at 23% 46%, rgba(52, 103, 68, 0.6), transparent 14%),
        radial-gradient(circle at 41% 32%, rgba(105, 123, 101, 0.38), transparent 17%),
        radial-gradient(circle at 72% 34%, rgba(130, 135, 118, 0.32), transparent 18%),
        linear-gradient(140deg, #53635d 0%, #203f36 28%, #60716a 45%, #2e453e 62%, #74776c 100%);
      filter: saturate(0.82) contrast(1.08);
    }

    .map-backdrop::before {
      content: "";
      position: absolute;
      inset: -80rem -40rem;
      opacity: 0.62;
      background-image:
        linear-gradient(24deg, transparent 0 47%, rgba(230, 232, 217, 0.22) 48% 50%, transparent 51% 100%),
        linear-gradient(118deg, transparent 0 44%, rgba(238, 239, 220, 0.2) 45% 48%, transparent 49% 100%),
        linear-gradient(87deg, transparent 0 46%, rgba(25, 34, 31, 0.28) 47% 51%, transparent 52% 100%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.07) 1rem, transparent 2rem),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1rem, transparent 2rem);
      background-size: 340rem 190rem, 380rem 230rem, 260rem 210rem, 86rem 86rem, 86rem 86rem;
      transform: rotate(-8deg) scale(1.1);
    }

    .map-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 8, 8, 0.78) 0%, rgba(0, 12, 10, 0.08) 22%, rgba(0, 10, 9, 0.52) 92%, rgba(0, 14, 11, 0.92) 100%),
        radial-gradient(circle at 52% 60%, rgba(255, 247, 220, 0.2), transparent 18%);
    }

    .map-svg,
    .route-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-svg {
      z-index: 2;
      opacity: 0.72;
    }

    .route-svg {
      z-index: 8;
      overflow: visible;
    }

    .river {
      fill: none;
      stroke: rgba(53, 105, 115, 0.9);
      stroke-width: 62;
      stroke-linecap: round;
    }

    .road {
      fill: none;
      stroke: rgba(235, 225, 199, 0.24);
      stroke-width: 12;
      stroke-linecap: round;
    }

    .road.thin {
      stroke-width: 6;
      opacity: 0.65;
    }

    .park {
      fill: rgba(42, 89, 57, 0.6);
      stroke: rgba(218, 222, 193, 0.16);
      stroke-width: 2;
    }

    .route-base {
      fill: none;
      stroke: rgba(255, 235, 194, 0.65);
      stroke-width: 7;
      stroke-linecap: round;
      filter: url("#routeGlow");
    }

    .route-core {
      fill: none;
      stroke: #ffd18f;
      stroke-width: 2.6;
      stroke-linecap: round;
    }

    .route-dot {
      fill: #fff1c7;
      filter: url("#routeGlow");
    }

      position: relative;
      z-index: 10;
      height: 2048rem;
    }

      position: absolute;
      top: 27rem;

      right: 47rem;

      align-items: center;
      justify-content: space-between;

    .signal span:nth-child(2) { height: 18rem; }
    .signal span:nth-child(3) { height: 25rem; }

      left: 50%;

    .chip svg {

    .locator::before {

      position: absolute;

      height: 214rem;
      border: 2rem solid rgba(255, 245, 221, 0.74);
      border-radius: 50%;

      transform: translate(-50%, -50%);

    .locator .scan {
      position: absolute;

      top: 50%;

      height: 214rem;
      border: 1rem solid rgba(255, 234, 196, 0.5);

    .locator .dot {

    .pin svg {

      position: absolute;
      z-index: 18;
      top: 799rem;
      right: 48rem;

      height: 94rem;

      right: 47rem;

      const intro = gsap.timeline({ defaults: { ease: "power3.out" } });

        .from(".chip", { y: 8, opacity: 0, duration: 0.22, stagger: 0.03 }, 0.2)
        .from(".locator", { scale: 0.78, opacity: 0, duration: 0.24 }, 0.22)
        .from(".pin", { y: -10, opacity: 0, duration: 0.28, stagger: 0.04, ease: "back.out(1.5)" }, 0.24)
        .from(".recommend-title", { x: -8, opacity: 0, duration: 0.22 }, 0.3)
        .from(".metric-strip", { y: 10, opacity: 0, duration: 0.24 }, 0.32)

        duration: 0.8,
        repeat: 1,
        ease: "power1.out",
        transformOrigin: "50% 50%"
      });

      gsap.to(".pin-shape", {
        y: -5,
        duration: 0.45,
        repeat: 1,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.18
      });

      document.querySelectorAll(".route-line").forEach((path) => {
        const length = path.getTotalLength();
        gsap.set(path, { strokeDasharray: length, strokeDashoffset: length });
        gsap.to(path, { strokeDashoffset: 0, duration: 0.7, delay: 0.2, ease: "power2.out" });
      });

      document.querySelectorAll(".heart-line, .archive-next, .filter-btn").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(button, { scale: 0.88 }, { scale: 1, duration: 0.42, ease: "elastic.out(1, 0.45)" });
        });
      });

      document.querySelector(".archive-next").addEventListener("click", () => {
        gsap.fromTo(".portrait.main", { x: 26, opacity: 0.65 }, { x: 0, opacity: 1, duration: 0.46, ease: "power2.out" });
        gsap.to(".portrait.side-left, .portrait.side-right", { rotate: "+=3", duration: 0.46, yoyo: true, repeat: 1, ease: "sine.inOut" });
      });
    });
  </script>
</body>
</html>
