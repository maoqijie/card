<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，把收藏的妆先试成你的样子，看看合不合脸。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/face-muse-person-feed.webp" fetchpriority="high">
  <link rel="preload" as="image" href="./assets/portrait-left.jpg">
  <link rel="stylesheet" href="./assets/feed-components.css">
  <title>Face Muse - 把收藏的妆试成你的样子</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-person-feed.webp");
      --hero-position: 50% 34%;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / cover no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / cover no-repeat;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }


    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      display: grid;
      grid-template-columns: 304rem 1fr;
      gap: 18rem;
      padding: 22rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 32rem;
      background:
        linear-gradient(135deg, rgba(255, 209, 199, 0.18), rgba(255, 255, 255, 0.02) 42%, transparent 68%),
        linear-gradient(180deg, rgba(60, 110, 72, 0.72), rgba(12, 55, 36, 0.8));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
    }

    .tryon-stage {
      position: relative;
      min-width: 0;
      height: 100%;
      isolation: isolate;
    }

    .blend-track {
      position: absolute;
      left: 50%;
      top: 70rem;
      bottom: 48rem;
      z-index: 1;
      width: 2rem;
      background: linear-gradient(180deg, transparent, rgba(255, 224, 214, 0.86), transparent);
      transform: translateX(-50%);
    }

    .preview-card {
      position: absolute;
      top: 32rem;
      width: 176rem;
      height: 300rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.24);
      border-radius: 26rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 20rem 34rem rgba(0, 0, 0, 0.24);
      cursor: pointer;
      transform-origin: 50% 88%;
      transition: transform 0.28s ease, border-color 0.28s ease, filter 0.28s ease;
    }

    .preview-card.reference {
      left: 2rem;
      transform: rotate(-7deg);
    }

    .preview-card.self {
      right: 2rem;
      top: 18rem;
      transform: rotate(6deg);
    }

    .preview-card.is-active {
      z-index: 3;
      border-color: rgba(255, 225, 215, 0.78);
      filter: saturate(1.08);
      box-shadow: 0 26rem 42rem rgba(0, 0, 0, 0.3), 0 0 0 2rem rgba(255, 225, 215, 0.12);
    }

    .preview-card.reference.is-active {
      transform: translateY(-10rem) rotate(-2deg) scale(1.03);
    }

    .preview-card.self.is-active {
      transform: translateY(-10rem) rotate(2deg) scale(1.03);
    }

    .preview-image {
      position: absolute;
      inset: 0;
      background: var(--preview) center / cover no-repeat;
      transform: scale(1.03);
      transition: transform 0.28s ease;
    }

    .preview-card.is-active .preview-image {
      transform: scale(1.08);
    }

    .preview-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 42%, rgba(0, 0, 0, 0.34));
    }

    .preview-label,
    .preview-caption {
      position: absolute;
      z-index: 1;
      left: 18rem;
      letter-spacing: 0;
    }

    .preview-label {
      top: 17rem;
      padding: 9rem 14rem 10rem;
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.38);
      font-size: 23rem;
      line-height: 1;
      font-weight: 900;
      backdrop-filter: blur(7rem);
    }

    .preview-caption {
      right: 18rem;
      bottom: 18rem;
      color: rgba(255, 255, 255, 0.78);
      font-size: 22rem;
      line-height: 1.15;
      font-weight: 700;
      text-shadow: 0 2rem 10rem rgba(0, 0, 0, 0.5);
    }

    .blend-handle {
      position: absolute;
      left: 50%;
      top: 164rem;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 64rem;
      height: 64rem;
      border: 4rem solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      color: rgba(29, 55, 38, 0.94);
      background: #f1ded0;
      box-shadow: 0 9rem 24rem rgba(0, 0, 0, 0.22);
      transform: translate(-50%, -50%);
    }

    .blend-handle span {
      display: block;
      font-size: 31rem;
      line-height: 1;
      font-weight: 900;
    }

    .spark {
      display: inline-grid;
      place-items: center;
      width: 34rem;
      height: 34rem;
      margin-right: 10rem;
      font-size: 30rem;
      color: #fff;
      filter: drop-shadow(0 0 8rem rgba(255, 255, 255, 0.5));
    }

    .match-panel {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12rem;
    }

    .match-kicker {
      display: flex;
      align-items: center;
      margin: 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .match-title-row {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .match-title {
      min-width: 0;
      margin: 0;
      color: #fff;
      font-size: 37rem;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .match-score {
      flex: 0 0 auto;
      padding: 9rem 13rem 10rem;
      border: 1rem solid rgba(255, 215, 207, 0.24);
      border-radius: 999rem;
      color: #ffd0c9;
      font-size: 25rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      background: rgba(255, 255, 255, 0.1);
    }

    .match-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 25rem;
      line-height: 1.35;
      font-weight: 650;
      letter-spacing: 0;
    }

    .fit-board {
      display: grid;
      grid-template-columns: 104rem 1fr;
      align-items: center;
      gap: 14rem;
      min-width: 0;
    }

    .match-meter {
      position: relative;
      display: grid;
      place-items: center;
      width: 104rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(#ffd0c9 0 86%, rgba(255, 255, 255, 0.13) 86% 100%);
      box-shadow: inset 0 0 0 1rem rgba(255, 255, 255, 0.22), 0 12rem 24rem rgba(0, 0, 0, 0.16);
    }

    .match-meter::before {
      content: "";
      position: absolute;
      inset: 10rem;
      border-radius: inherit;
      background: rgba(17, 57, 38, 0.94);
    }

    .match-meter strong,
    .match-meter small {
      position: relative;
      z-index: 1;
      display: block;
      text-align: center;
      letter-spacing: 0;
    }

    .match-meter strong {
      color: #fff;
      font-size: 32rem;
      line-height: 1;
      font-weight: 900;
    }

    .match-meter small {
      margin-top: 6rem;
      color: rgba(255, 255, 255, 0.58);
      font-size: 17rem;
      line-height: 1;
      font-weight: 700;
    }

    .fit-list {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10rem;
    }

    .fit-chip {
      min-height: 52rem;
      display: flex;
      align-items: center;
      gap: 8rem;
      padding: 0 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.12);
      border-radius: 12rem;
      color: rgba(255, 255, 255, 0.86);
      background: rgba(255, 255, 255, 0.08);
      font-size: 21rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .fit-chip::before {
      content: "";
      flex: 0 0 auto;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #ffd0c9;
      box-shadow: 0 0 12rem rgba(255, 208, 201, 0.55);
    }

    .tap-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9rem;
    }

    .tap-pill {
      height: 47rem;
      display: grid;
      place-items: center;
      padding: 0 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.15);
      border-radius: 12rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.08);
      font-size: 21rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 959rem;
    }

    .note-label {
      margin: 0 0 26rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 31rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 31rem;
    }

    .quote {
      position: relative;
      min-height: 171rem;
      padding: 0 152rem 0 34rem;
      border-left: 2rem dashed rgba(255, 255, 255, 0.14);
    }

    .quote h2 {
      margin: 0 0 18rem;
      color: #fff;
      font-size: 35rem;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      position: absolute;
      left: -5rem;
      top: -10rem;
      color: rgba(255, 255, 255, 0.42);
      font-size: 56rem;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 29rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 0;
      top: 8rem;
      width: 121rem;
      height: 156rem;
      overflow: hidden;
      border-radius: 11rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    .preview-card:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, 0.8);
      outline-offset: 5rem;
    }
  </style>
  <script src="./assets/feed-components.js" defer></script>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <feed-status></feed-status>

    <feed-top-nav active="推荐"></feed-top-nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">把收藏的妆试成你的样子</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="推荐摘要卡片">
        <div class="tryon-stage" aria-label="试妆对照预览">
          <span class="blend-track" aria-hidden="true"></span>
          <div class="preview-card reference is-active" role="button" tabindex="0" aria-pressed="true" data-copy="参考图已锁定：系统先抓取眼影范围、腮红高度和唇线边界，再投到你的自拍上。">
            <span class="preview-image" style="--preview: url('./assets/face-muse-3-reference.webp')"></span>
            <span class="preview-label">参考图</span>
            <span class="preview-caption">收藏妆容</span>
          </div>
          <div class="preview-card self" role="button" tabindex="0" aria-pressed="false" data-copy="自拍预览已打开：低饱和玫瑰色会自动压淡，保留你的五官比例，不硬套原图。">
            <span class="preview-image" style="--preview: url('./assets/face-muse-3-self.webp')"></span>
            <span class="preview-label">自拍视频</span>
            <span class="preview-caption">上脸预演</span>
          </div>
          <span class="blend-handle" aria-hidden="true"><span>⇄</span></span>
        </div>

        <div class="match-panel">
          <p class="match-kicker"><span class="spark">✦</span>试成你的脸</p>
          <div class="match-title-row">
            <h2 class="match-title">低饱和玫瑰妆</h2>
            <span class="match-score">86%</span>
          </div>
          <p class="match-copy">参考图与自拍已叠画对齐，点左侧卡片在“原图灵感”和“上脸预演”之间切换。</p>
          <div class="fit-board">
            <div class="match-meter" aria-label="适配度 86%">
              <div>
                <strong>86%</strong>
                <small>适配度</small>
              </div>
            </div>
            <div class="fit-list" aria-label="适配拆解">
              <span class="fit-chip">肤色提亮</span>
              <span class="fit-chip">眼影缩小</span>
              <span class="fit-chip">腮红上移</span>
              <span class="fit-chip">唇线柔化</span>
            </div>
          </div>
          <div class="tap-strip" aria-hidden="true">
            <span class="tap-pill">点卡片切换</span>
            <span class="tap-pill">4 步可保存</span>
          </div>
        </div>
      </article>

      <section class="creator-note" aria-label="美妆博主推荐">
        <p class="note-label">低饱和玫瑰妆</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>底妆明度拉平，先把脸颊和鼻梁的灰度统一。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-left.jpg')"></span>
              <span>步骤 01：肤色先干净，后续颜色才不显脏。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-01.png')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>眼影范围缩小，腮红位置上移，唇线边界柔化。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span>练习记录：低饱和玫瑰妆 4 步已生成。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-02.png')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <feed-progress fills="100,63,0,0,0"></feed-progress>

      <feed-actions label="推荐操作" primary="查看详情" secondary="不感兴趣" order="secondary-primary"></feed-actions>

      <feed-swipe-tip text="上滑继续看推荐"></feed-swipe-tip>
    </section>

    <feed-bottom-nav></feed-bottom-nav>
    <feed-home-indicator></feed-home-indicator>
  </main>

  <script src="./assets/gsap.min.js" defer></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!window.gsap) {
        document.documentElement.dataset.gsapLoaded = "false";
        return;
      }

      document.documentElement.dataset.gsapLoaded = "true";
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const previewCards = Array.from(document.querySelectorAll(".preview-card"));
      const matchCopy = document.querySelector(".match-copy");

      const selectPreview = (activeCard) => {
        previewCards.forEach((card) => {
          const isActive = card === activeCard;
          card.classList.toggle("is-active", isActive);
          card.setAttribute("aria-pressed", String(isActive));
        });

        if (matchCopy && activeCard.dataset.copy) {
          matchCopy.textContent = activeCard.dataset.copy;
        }

        if (reduceMotion) {
          return;
        }

        gsap.fromTo(activeCard.querySelector(".preview-image"), { scale: 1.04 }, { scale: 1.1, duration: 0.32, repeat: 1, yoyo: true, ease: "power2.out" });
        gsap.fromTo(".fit-chip", { y: 5, autoAlpha: 0.72 }, { y: 0, autoAlpha: 1, duration: 0.28, stagger: 0.035, ease: "power2.out" });
        gsap.fromTo(".blend-handle span", { x: -5 }, { x: 5, duration: 0.32, repeat: 1, yoyo: true, ease: "sine.inOut" });
      };

      previewCards.forEach((card) => {
        card.addEventListener("click", () => selectPreview(card));
        card.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }
          event.preventDefault();
          selectPreview(card);
        });
      });

      if (reduceMotion) {
        return;
      }

      gsap.from(".hero-grain", { scale: 1.08, duration: 1.1, ease: "power2.out" });
      gsap.from(".status-bar, .top-nav", { y: -16, autoAlpha: 0, duration: 0.42, stagger: 0.08, ease: "power3.out" });
      gsap.from(".headline", { y: 28, autoAlpha: 0, duration: 0.58, delay: 0.12, ease: "power3.out" });
      gsap.from(".info-card", { y: 34, autoAlpha: 0, duration: 0.64, delay: 0.24, ease: "power3.out" });
      gsap.from(".preview-card", { y: 14, autoAlpha: 0, duration: 0.34, delay: 0.38, stagger: 0.05, ease: "power3.out" });
      gsap.from(".match-panel > *", { y: 10, autoAlpha: 0, duration: 0.32, delay: 0.44, stagger: 0.035, ease: "power2.out" });
      gsap.from(".fit-chip, .tap-pill", { y: 8, autoAlpha: 0, duration: 0.28, delay: 0.54, stagger: 0.025, ease: "power2.out" });
      gsap.from(".quote", { x: -18, autoAlpha: 0, duration: 0.5, delay: 0.48, stagger: 0.09, ease: "power3.out" });
      gsap.from(".progress span, .action-button, .swipe-tip", { y: 16, duration: 0.42, delay: 0.66, stagger: 0.04, ease: "power2.out" });
      gsap.from(".bottom-link", { y: 16, duration: 0.38, delay: 0.72, stagger: 0.035, ease: "power2.out" });
      gsap.to(".hero-grain", { scale: 1.045, duration: 7, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".match-meter", { scale: 1.035, duration: 1.3, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".blend-handle span", { x: 5, duration: 0.95, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".chevrons", { y: -7, duration: 0.9, repeat: -1, yoyo: true, ease: "sine.inOut" });

      document.querySelectorAll("button, .bottom-link").forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(item, { scale: 0.96 }, { scale: 1, duration: 0.32, ease: "back.out(2.4)" });
        });
      });
    });
  </script>
</body>
</html>
