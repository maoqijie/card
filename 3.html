<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 抖音式推荐 feed 卡片，把收藏的妆先试成你的样子，看看合不合脸。">
  <link rel="icon" href="data:,">
  <link rel="preload" as="image" href="./assets/face-muse-person-feed.webp">
  <link rel="preload" as="image" href="./assets/portrait-left.jpg">
  <title>Face Muse - 把收藏的妆试成你的样子</title>
  <style>
    :root {
      color-scheme: dark;
      --screen-w: 887;
      --screen-h: 1920;
      --page-bg: #020907;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.56);
      --soft: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(36, 85, 56, 0.66);
      --panel-strong: rgba(31, 80, 52, 0.78);
      --accent: #ffffff;
      --cta: rgba(88, 128, 91, 0.72);
      --hero-image: url("./assets/face-muse-person-feed.webp");
      --hero-position: 50% 34%;
      font-size: calc(min(100vw, calc(100vh * 887 / 1920), 887px) / 887);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-screen {
      position: relative;
      width: calc(var(--screen-w) * 1rem);
      height: calc(var(--screen-h) * 1rem);
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(1, 15, 9, 0.24) 0%, rgba(5, 61, 34, 0.28) 31%, rgba(3, 52, 30, 0.96) 78%, #03100b 100%),
        var(--hero-image) var(--hero-position) / cover no-repeat;
    }

    .feed-screen::before,
    .feed-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .feed-screen::before {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.08) 21%, rgba(7, 78, 43, 0.34) 47%, rgba(2, 47, 27, 0.96) 87%, #000 100%),
        radial-gradient(ellipse at 50% 13%, rgba(255, 255, 255, 0.12), transparent 34%);
      backdrop-filter: saturate(0.95);
    }

    .feed-screen::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32), transparent 20%, transparent 80%, rgba(0, 0, 0, 0.28)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.28) 100%);
    }

    .hero-grain {
      position: absolute;
      inset: -28rem;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        radial-gradient(circle at 78% 38%, rgba(159, 217, 165, 0.12), transparent 20%),
        var(--hero-image) var(--hero-position) / cover no-repeat;
      filter: saturate(0.86) contrast(1.04);
      transform: scale(1.02);
    }

    .status-bar {
      position: absolute;
      top: 44rem;
      left: 80rem;
      right: 39rem;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 34rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .signal {
      display: flex;
      align-items: end;
      gap: 5rem;
      width: 42rem;
      height: 31rem;
    }

    .signal span {
      width: 7rem;
      border-radius: 7rem;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 12rem; }
    .signal span:nth-child(2) { height: 18rem; }
    .signal span:nth-child(3) { height: 25rem; }
    .signal span:nth-child(4) { height: 31rem; }

    .wifi {
      position: relative;
      width: 39rem;
      height: 31rem;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 6rem solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 1rem;
      width: 36rem;
      height: 36rem;
    }

    .wifi::after {
      top: 11rem;
      width: 18rem;
      height: 18rem;
    }

    .wifi i {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    .battery {
      position: relative;
      width: 51rem;
      height: 28rem;
      border: 3rem solid rgba(255, 255, 255, 0.92);
      border-radius: 7rem;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 5rem 7rem;
      border-radius: 3rem;
      background: #fff;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -8rem;
      top: 8rem;
      width: 4rem;
      height: 11rem;
      border-radius: 0 4rem 4rem 0;
      background: rgba(255, 255, 255, 0.86);
    }

    .top-nav {
      position: absolute;
      top: 127rem;
      left: 38rem;
      right: 38rem;
      z-index: 4;
      display: grid;
      grid-template-columns: 58rem 1fr 58rem;
      align-items: center;
      gap: 24rem;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 58rem;
      height: 58rem;
      border: 0;
      padding: 0;
      color: #fff;
      background: transparent;
      cursor: pointer;
    }

    .icon-button svg {
      width: 54rem;
      height: 54rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .channels {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, max-content);
      justify-content: space-between;
      align-items: center;
      gap: 15rem;
      color: rgba(255, 255, 255, 0.54);
      font-size: 31rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .channel {
      position: relative;
      white-space: nowrap;
    }

    .channel.active {
      color: #fff;
      font-size: 39rem;
      text-shadow: 0 4rem 18rem rgba(0, 0, 0, 0.24);
    }

    .channel.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24rem;
      width: 70rem;
      height: 5rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .headline {
      position: absolute;
      left: 47rem;
      right: 44rem;
      top: 397rem;
      display: flex;
      align-items: center;
      gap: 24rem;
    }

    h1 {
      flex: 1;
      margin: 0;
      color: #fff;
      font-size: 57rem;
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8rem 28rem rgba(0, 0, 0, 0.42);
    }

    .ai-badge {
      flex: 0 0 auto;
      padding: 11rem 16rem 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.28);
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.08);
      font-size: 26rem;
      line-height: 1;
      letter-spacing: 0;
      backdrop-filter: blur(8rem);
    }

    .info-card {
      position: absolute;
      left: 45rem;
      right: 45rem;
      top: 508rem;
      height: 407rem;
      display: grid;
      grid-template-columns: 304rem 1fr;
      gap: 18rem;
      padding: 22rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.16);
      border-radius: 32rem;
      background:
        linear-gradient(135deg, rgba(255, 209, 199, 0.18), rgba(255, 255, 255, 0.02) 42%, transparent 68%),
        linear-gradient(180deg, rgba(60, 110, 72, 0.72), rgba(12, 55, 36, 0.8));
      box-shadow: 0 22rem 50rem rgba(0, 0, 0, 0.18), inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14rem);
    }

    .tryon-stage {
      position: relative;
      min-width: 0;
      height: 100%;
      isolation: isolate;
    }

    .blend-track {
      position: absolute;
      left: 50%;
      top: 70rem;
      bottom: 48rem;
      z-index: 1;
      width: 2rem;
      background: linear-gradient(180deg, transparent, rgba(255, 224, 214, 0.86), transparent);
      transform: translateX(-50%);
    }

    .preview-card {
      position: absolute;
      top: 32rem;
      width: 176rem;
      height: 300rem;
      overflow: hidden;
      border: 1rem solid rgba(255, 255, 255, 0.24);
      border-radius: 26rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 20rem 34rem rgba(0, 0, 0, 0.24);
      cursor: pointer;
      transform-origin: 50% 88%;
      transition: transform 0.28s ease, border-color 0.28s ease, filter 0.28s ease;
    }

    .preview-card.reference {
      left: 2rem;
      transform: rotate(-7deg);
    }

    .preview-card.self {
      right: 2rem;
      top: 18rem;
      transform: rotate(6deg);
    }

    .preview-card.is-active {
      z-index: 3;
      border-color: rgba(255, 225, 215, 0.78);
      filter: saturate(1.08);
      box-shadow: 0 26rem 42rem rgba(0, 0, 0, 0.3), 0 0 0 2rem rgba(255, 225, 215, 0.12);
    }

    .preview-card.reference.is-active {
      transform: translateY(-10rem) rotate(-2deg) scale(1.03);
    }

    .preview-card.self.is-active {
      transform: translateY(-10rem) rotate(2deg) scale(1.03);
    }

    .preview-image {
      position: absolute;
      inset: 0;
      background: var(--preview) center / cover no-repeat;
      transform: scale(1.03);
      transition: transform 0.28s ease;
    }

    .preview-card.is-active .preview-image {
      transform: scale(1.08);
    }

    .preview-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 42%, rgba(0, 0, 0, 0.34));
    }

    .preview-label,
    .preview-caption {
      position: absolute;
      z-index: 1;
      left: 18rem;
      letter-spacing: 0;
    }

    .preview-label {
      top: 17rem;
      padding: 9rem 14rem 10rem;
      border-radius: 8rem;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.38);
      font-size: 23rem;
      line-height: 1;
      font-weight: 900;
      backdrop-filter: blur(7rem);
    }

    .preview-caption {
      right: 18rem;
      bottom: 18rem;
      color: rgba(255, 255, 255, 0.78);
      font-size: 22rem;
      line-height: 1.15;
      font-weight: 700;
      text-shadow: 0 2rem 10rem rgba(0, 0, 0, 0.5);
    }

    .blend-handle {
      position: absolute;
      left: 50%;
      top: 164rem;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 64rem;
      height: 64rem;
      border: 4rem solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      color: rgba(29, 55, 38, 0.94);
      background: #f1ded0;
      box-shadow: 0 9rem 24rem rgba(0, 0, 0, 0.22);
      transform: translate(-50%, -50%);
    }

    .blend-handle span {
      display: block;
      font-size: 31rem;
      line-height: 1;
      font-weight: 900;
    }

    .spark {
      display: inline-grid;
      place-items: center;
      width: 34rem;
      height: 34rem;
      margin-right: 10rem;
      font-size: 30rem;
      color: #fff;
      filter: drop-shadow(0 0 8rem rgba(255, 255, 255, 0.5));
    }

    .match-panel {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12rem;
    }

    .match-kicker {
      display: flex;
      align-items: center;
      margin: 0;
      color: rgba(255, 255, 255, 0.68);
      font-size: 24rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .match-title-row {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14rem;
    }

    .match-title {
      min-width: 0;
      margin: 0;
      color: #fff;
      font-size: 37rem;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .match-score {
      flex: 0 0 auto;
      padding: 9rem 13rem 10rem;
      border: 1rem solid rgba(255, 215, 207, 0.24);
      border-radius: 999rem;
      color: #ffd0c9;
      font-size: 25rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      background: rgba(255, 255, 255, 0.1);
    }

    .match-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 25rem;
      line-height: 1.35;
      font-weight: 650;
      letter-spacing: 0;
    }

    .fit-board {
      display: grid;
      grid-template-columns: 104rem 1fr;
      align-items: center;
      gap: 14rem;
      min-width: 0;
    }

    .match-meter {
      position: relative;
      display: grid;
      place-items: center;
      width: 104rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(#ffd0c9 0 86%, rgba(255, 255, 255, 0.13) 86% 100%);
      box-shadow: inset 0 0 0 1rem rgba(255, 255, 255, 0.22), 0 12rem 24rem rgba(0, 0, 0, 0.16);
    }

    .match-meter::before {
      content: "";
      position: absolute;
      inset: 10rem;
      border-radius: inherit;
      background: rgba(17, 57, 38, 0.94);
    }

    .match-meter strong,
    .match-meter small {
      position: relative;
      z-index: 1;
      display: block;
      text-align: center;
      letter-spacing: 0;
    }

    .match-meter strong {
      color: #fff;
      font-size: 32rem;
      line-height: 1;
      font-weight: 900;
    }

    .match-meter small {
      margin-top: 6rem;
      color: rgba(255, 255, 255, 0.58);
      font-size: 17rem;
      line-height: 1;
      font-weight: 700;
    }

    .fit-list {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10rem;
    }

    .fit-chip {
      min-height: 52rem;
      display: flex;
      align-items: center;
      gap: 8rem;
      padding: 0 10rem;
      border: 1rem solid rgba(255, 255, 255, 0.12);
      border-radius: 12rem;
      color: rgba(255, 255, 255, 0.86);
      background: rgba(255, 255, 255, 0.08);
      font-size: 21rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .fit-chip::before {
      content: "";
      flex: 0 0 auto;
      width: 8rem;
      height: 8rem;
      border-radius: 50%;
      background: #ffd0c9;
      box-shadow: 0 0 12rem rgba(255, 208, 201, 0.55);
    }

    .tap-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9rem;
    }

    .tap-pill {
      height: 47rem;
      display: grid;
      place-items: center;
      padding: 0 12rem;
      border: 1rem solid rgba(255, 255, 255, 0.15);
      border-radius: 12rem;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.08);
      font-size: 21rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
    }

    .creator-note {
      position: absolute;
      left: 47rem;
      right: 47rem;
      top: 959rem;
    }

    .note-label {
      margin: 0 0 26rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 31rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .quote-list {
      display: grid;
      gap: 31rem;
    }

    .quote {
      position: relative;
      min-height: 171rem;
      padding: 0 152rem 0 34rem;
      border-left: 2rem dashed rgba(255, 255, 255, 0.14);
    }

    .quote h2 {
      margin: 0 0 18rem;
      color: #fff;
      font-size: 35rem;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quote-mark {
      position: absolute;
      left: -5rem;
      top: -10rem;
      color: rgba(255, 255, 255, 0.42);
      font-size: 56rem;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 12rem;
      color: rgba(255, 255, 255, 0.46);
      font-size: 29rem;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
    }

    .avatar {
      width: 35rem;
      height: 35rem;
      border: 2rem solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: var(--avatar) center / cover no-repeat;
      box-shadow: 0 0 0 2rem rgba(0, 0, 0, 0.16);
    }

    .thumb {
      position: absolute;
      right: 0;
      top: 8rem;
      width: 121rem;
      height: 156rem;
      overflow: hidden;
      border-radius: 11rem;
      background: var(--thumb) center / cover no-repeat;
      box-shadow: 0 12rem 28rem rgba(0, 0, 0, 0.22);
    }

    .thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
    }

    .play {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 39rem;
      height: 39rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      transform: translate(-50%, -50%);
    }

    .play::before {
      content: "";
      position: absolute;
      left: 15rem;
      top: 10rem;
      width: 0;
      height: 0;
      border-top: 9rem solid transparent;
      border-bottom: 9rem solid transparent;
      border-left: 14rem solid rgba(40, 72, 46, 0.92);
    }

    .progress {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1554rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10rem;
    }

    .progress span {
      position: relative;
      height: 6rem;
      overflow: hidden;
      border-radius: 999rem;
      background: rgba(255, 255, 255, 0.16);
    }

    .progress span::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--fill, 0%);
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.68);
    }

    .action-row {
      position: absolute;
      left: 46rem;
      right: 46rem;
      top: 1595rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20rem;
    }

    .action-button {
      height: 99rem;
      border: 0;
      border-radius: 17rem;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(99, 139, 97, 0.72);
      font-size: 34rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      backdrop-filter: blur(8rem);
    }

    .action-button.secondary {
      color: rgba(255, 255, 255, 0.55);
      background: rgba(93, 138, 93, 0.44);
    }

    .swipe-tip {
      position: absolute;
      left: 0;
      right: 0;
      top: 1732rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10rem;
      color: rgba(255, 255, 255, 0.53);
      font-size: 27rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chevrons {
      position: relative;
      width: 25rem;
      height: 25rem;
    }

    .chevrons::before,
    .chevrons::after {
      content: "";
      position: absolute;
      left: 5rem;
      width: 16rem;
      height: 16rem;
      border-left: 4rem solid rgba(255, 255, 255, 0.55);
      border-top: 4rem solid rgba(255, 255, 255, 0.55);
      transform: rotate(45deg);
    }

    .chevrons::before { top: 6rem; }
    .chevrons::after { top: -3rem; opacity: 0.7; }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      height: 190rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1.08fr 1fr 1fr;
      align-items: start;
      padding: 35rem 34rem 0;
      background: #000;
      box-shadow: 0 -20rem 40rem rgba(0, 0, 0, 0.22);
    }

    .bottom-link {
      display: grid;
      justify-items: center;
      gap: 11rem;
      color: rgba(255, 255, 255, 0.46);
      text-decoration: none;
      font-size: 33rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .bottom-link.active {
      color: #fff;
    }

    .plus-button {
      display: grid;
      place-items: center;
      justify-self: center;
      width: 82rem;
      height: 58rem;
      margin-top: -9rem;
      border: 6rem solid #fff;
      border-radius: 20rem;
      color: #fff;
      background: #000;
      box-shadow: -5rem 0 0 #21f4ee, 5rem 0 0 #fe2c55;
    }

    .plus-button svg {
      width: 38rem;
      height: 38rem;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 17rem;
      z-index: 6;
      width: 298rem;
      height: 7rem;
      border-radius: 999rem;
      background: #fff;
      transform: translateX(-50%);
    }

    .preview-card:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 3rem solid rgba(255, 255, 255, 0.8);
      outline-offset: 5rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="feed-screen" aria-labelledby="page-title">
    <div class="hero-grain" aria-hidden="true"></div>

    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <div class="system-icons">
        <span class="signal"><span></span><span></span><span></span><span></span></span>
        <span class="wifi"><i></i></span>
        <span class="battery"></span>
      </div>
    </div>

    <nav class="top-nav" aria-label="频道导航">
      <button class="icon-button" type="button" aria-label="打开菜单">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M7 14h34M7 24h34M7 34h34"></path></svg>
      </button>
      <div class="channels" aria-label="内容频道">
        <span class="channel">团购</span>
        <span class="channel">经验</span>
        <span class="channel">北京</span>
        <span class="channel">关注</span>
        <span class="channel">商城</span>
        <span class="channel active">推荐</span>
      </div>
      <button class="icon-button" type="button" aria-label="搜索">
        <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="21" cy="21" r="13"></circle><path d="M31.5 31.5 42 42"></path></svg>
      </button>
    </nav>

    <section class="content" aria-label="推荐内容">
      <div class="headline">
        <h1 id="page-title">把收藏的妆试成你的样子</h1>
        <span class="ai-badge">AI推荐</span>
      </div>

      <article class="info-card" aria-label="推荐摘要卡片">
        <div class="tryon-stage" aria-label="试妆对照预览">
          <span class="blend-track" aria-hidden="true"></span>
          <div class="preview-card reference is-active" role="button" tabindex="0" aria-pressed="true" data-copy="参考图已锁定：系统先抓取眼影范围、腮红高度和唇线边界，再投到你的自拍上。">
            <span class="preview-image" style="--preview: url('./assets/portrait-left.jpg')"></span>
            <span class="preview-label">参考图</span>
            <span class="preview-caption">收藏妆容</span>
          </div>
          <div class="preview-card self" role="button" tabindex="0" aria-pressed="false" data-copy="自拍预览已打开：低饱和玫瑰色会自动压淡，保留你的五官比例，不硬套原图。">
            <span class="preview-image" style="--preview: url('./assets/portrait-right.jpg')"></span>
            <span class="preview-label">自拍视频</span>
            <span class="preview-caption">上脸预演</span>
          </div>
          <span class="blend-handle" aria-hidden="true"><span>⇄</span></span>
        </div>

        <div class="match-panel">
          <p class="match-kicker"><span class="spark">✦</span>试成你的脸</p>
          <div class="match-title-row">
            <h2 class="match-title">低饱和玫瑰妆</h2>
            <span class="match-score">86%</span>
          </div>
          <p class="match-copy">参考图与自拍已叠画对齐，点左侧卡片在“原图灵感”和“上脸预演”之间切换。</p>
          <div class="fit-board">
            <div class="match-meter" aria-label="适配度 86%">
              <div>
                <strong>86%</strong>
                <small>适配度</small>
              </div>
            </div>
            <div class="fit-list" aria-label="适配拆解">
              <span class="fit-chip">肤色提亮</span>
              <span class="fit-chip">眼影缩小</span>
              <span class="fit-chip">腮红上移</span>
              <span class="fit-chip">唇线柔化</span>
            </div>
          </div>
          <div class="tap-strip" aria-hidden="true">
            <span class="tap-pill">点卡片切换</span>
            <span class="tap-pill">4 步可保存</span>
          </div>
        </div>
      </article>

      <section class="creator-note" aria-label="美妆博主推荐">
        <p class="note-label">低饱和玫瑰妆</p>
        <div class="quote-list">
          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>底妆明度拉平，先把脸颊和鼻梁的灰度统一。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-left.jpg')"></span>
              <span>步骤 01：肤色先干净，后续颜色才不显脏。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-01.png')"><span class="play"></span></div>
          </article>

          <article class="quote">
            <span class="quote-mark">“</span>
            <h2>眼影范围缩小，腮红位置上移，唇线边界柔化。</h2>
            <div class="author-row">
              <span class="avatar" style="--avatar: url('./assets/portrait-right.jpg')"></span>
              <span>练习记录：低饱和玫瑰妆 4 步已生成。</span>
            </div>
            <div class="thumb" style="--thumb: url('./assets/step-02.png')"><span class="play"></span></div>
          </article>
        </div>
      </section>

      <div class="progress" aria-hidden="true">
        <span style="--fill: 100%"></span>
        <span style="--fill: 63%"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="action-row" aria-label="推荐操作">
        <button class="action-button secondary" type="button">不感兴趣</button>
        <button class="action-button" type="button">查看详情</button>
      </div>

      <div class="swipe-tip" aria-hidden="true">
        <span class="chevrons"></span>
        <span>上滑继续看推荐</span>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <a class="bottom-link active" href="#" aria-current="page">首页</a>
      <a class="bottom-link" href="#">朋友</a>
      <a class="bottom-link" href="#" aria-label="发布">
        <span class="plus-button" aria-hidden="true">
          <svg viewBox="0 0 48 48"><path d="M24 10v28M10 24h28"></path></svg>
        </span>
      </a>
      <a class="bottom-link" href="#">消息</a>
      <a class="bottom-link" href="#">我</a>
    </nav>
    <span class="home-indicator" aria-hidden="true"></span>
  </main>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const hasGsap = Boolean(window.gsap);
      document.documentElement.dataset.gsapLoaded = hasGsap ? "true" : "false";
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const previewCards = Array.from(document.querySelectorAll(".preview-card"));
      const matchCopy = document.querySelector(".match-copy");

      const selectPreview = (activeCard) => {
        previewCards.forEach((card) => {
          const isActive = card === activeCard;
          card.classList.toggle("is-active", isActive);
          card.setAttribute("aria-pressed", String(isActive));
        });

        if (matchCopy && activeCard.dataset.copy) {
          matchCopy.textContent = activeCard.dataset.copy;
        }

        if (!hasGsap || reduceMotion) {
          return;
        }

        gsap.fromTo(activeCard.querySelector(".preview-image"), { scale: 1.04 }, { scale: 1.1, duration: 0.32, repeat: 1, yoyo: true, ease: "power2.out" });
        gsap.fromTo(".fit-chip", { y: 5, autoAlpha: 0.72 }, { y: 0, autoAlpha: 1, duration: 0.28, stagger: 0.035, ease: "power2.out" });
        gsap.fromTo(".blend-handle span", { x: -5 }, { x: 5, duration: 0.32, repeat: 1, yoyo: true, ease: "sine.inOut" });
      };

      previewCards.forEach((card) => {
        card.addEventListener("click", () => selectPreview(card));
        card.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }
          event.preventDefault();
          selectPreview(card);
        });
      });

      if (!hasGsap || reduceMotion) {
        return;
      }

      gsap.from(".hero-grain", { scale: 1.08, duration: 1.1, ease: "power2.out" });
      gsap.from(".status-bar, .top-nav", { y: -16, autoAlpha: 0, duration: 0.42, stagger: 0.08, ease: "power3.out" });
      gsap.from(".headline", { y: 28, autoAlpha: 0, duration: 0.58, delay: 0.12, ease: "power3.out" });
      gsap.from(".info-card", { y: 34, autoAlpha: 0, duration: 0.64, delay: 0.24, ease: "power3.out" });
      gsap.from(".preview-card", { y: 20, autoAlpha: 0, duration: 0.48, delay: 0.38, stagger: 0.07, ease: "power3.out" });
      gsap.from(".match-panel > *", { y: 14, autoAlpha: 0, duration: 0.42, delay: 0.44, stagger: 0.045, ease: "power2.out" });
      gsap.from(".fit-chip, .tap-pill", { y: 12, autoAlpha: 0, duration: 0.36, delay: 0.54, stagger: 0.03, ease: "power2.out" });
      gsap.from(".quote", { x: -18, autoAlpha: 0, duration: 0.5, delay: 0.48, stagger: 0.09, ease: "power3.out" });
      gsap.from(".progress span, .action-button, .swipe-tip", { y: 16, duration: 0.42, delay: 0.66, stagger: 0.04, ease: "power2.out" });
      gsap.from(".bottom-link", { y: 16, duration: 0.38, delay: 0.72, stagger: 0.035, ease: "power2.out" });
      gsap.to(".hero-grain", { scale: 1.045, duration: 7, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".match-meter", { scale: 1.035, duration: 1.3, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".blend-handle span", { x: 5, duration: 0.95, repeat: -1, yoyo: true, ease: "sine.inOut" });
      gsap.to(".chevrons", { y: -7, duration: 0.9, repeat: -1, yoyo: true, ease: "sine.inOut" });

      document.querySelectorAll("button, .bottom-link").forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          gsap.fromTo(item, { scale: 0.96 }, { scale: 1, duration: 0.32, ease: "back.out(2.4)" });
        });
      });
    });
  </script>
</body>
</html>
