<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Face Muse 妆容练习页面，展示参考图与自拍叠画对比、低饱和玫瑰妆步骤和保存入口。">
  <link rel="icon" href="data:,">
  <title>Face Muse</title>
  <style>
    :root {
      --design-w: 1152;
      --design-h: 2048;
      --cream: #eadfce;
      --cream-soft: #d8cdbd;
      --pink: #e7aaa7;
      --deep: #03120d;
      --panel: rgba(24, 43, 31, 0.7);
      --stroke: rgba(226, 219, 194, 0.3);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #03120d;
    }

    body {
      display: grid;
      place-items: start center;
      overflow: hidden;
      font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
    }

    button,
    a {
      font: inherit;
    }

    .phone {
      position: relative;
      width: min(100vw, calc(100vh * var(--design-w) / var(--design-h)));
      aspect-ratio: var(--design-w) / var(--design-h);
      overflow: hidden;
      color: var(--cream);
      background:
        radial-gradient(circle at 49% 4%, rgba(103, 121, 77, 0.34) 0 8%, transparent 25%),
        radial-gradient(ellipse at 63% 63%, rgba(82, 115, 74, 0.34) 0 14%, transparent 33%),
        radial-gradient(ellipse at 21% 78%, rgba(59, 92, 63, 0.32) 0 12%, transparent 32%),
        linear-gradient(180deg, #02120d 0%, #071f16 30%, #0b2f22 52%, #051b13 100%);
      box-shadow: inset 0 0 min(21vw, 240px) rgba(0, 0, 0, 0.72);
      isolation: isolate;
    }

    .phone::before,
    .phone::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .phone::before {
      background:
        radial-gradient(ellipse at 50% 18%, rgba(230, 220, 184, 0.09), transparent 22%),
        radial-gradient(ellipse at 79% 91%, rgba(217, 204, 166, 0.11), transparent 21%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.48), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.43));
      mix-blend-mode: screen;
      opacity: 0.8;
    }

    .phone::after {
      box-shadow: inset 0 max(-19vw, -220px) min(25vw, 280px) rgba(0, 0, 0, 0.34);
    }

    .status {
      position: absolute;
      left: 5.9%;
      right: 6.2%;
      top: 1.85%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(19px, 3.4vw, 39px);
      font-weight: 700;
      line-height: 1;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: min(1.8vw, 21px);
    }

    .signal {
      display: flex;
      align-items: flex-end;
      gap: min(0.52vw, 6px);
      height: min(2.8vw, 32px);
    }

    .signal span {
      width: min(0.7vw, 8px);
      border-radius: 999px;
      background: #fff;
    }

    .signal span:nth-child(1) { height: 31%; }
    .signal span:nth-child(2) { height: 53%; }
    .signal span:nth-child(3) { height: 75%; }
    .signal span:nth-child(4) { height: 97%; }

    .wifi {
      position: relative;
      width: min(3.9vw, 45px);
      height: min(3vw, 34px);
      overflow: hidden;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: min(0.62vw, 7px) solid #fff;
      border-color: #fff transparent transparent transparent;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 8%;
      width: 112%;
      aspect-ratio: 1;
    }

    .wifi::after {
      top: 43%;
      width: 60%;
      aspect-ratio: 1;
    }

    .wifi span {
      position: absolute;
      left: 50%;
      bottom: 2%;
      width: 22%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    .battery {
      position: relative;
      width: min(5.6vw, 64px);
      height: min(2.9vw, 33px);
      border: min(0.26vw, 3px) solid rgba(255, 255, 255, 0.88);
      border-radius: min(0.7vw, 8px);
      box-shadow: 0 0 0 min(0.26vw, 3px) rgba(255, 255, 255, 0.15);
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 18% 13%;
      border-radius: min(0.35vw, 4px);
      background: #fff;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -16%;
      top: 28%;
      width: 8%;
      height: 44%;
      border-radius: 0 40% 40% 0;
      background: rgba(255, 255, 255, 0.72);
    }

    .round-btn {
      position: absolute;
      top: 5.22%;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 7.12%;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 min(1.2vw, 14px) rgba(255, 255, 255, 0.05), 0 min(1vw, 12px) min(2.8vw, 32px) rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .round-btn svg {
      width: 45%;
      height: 45%;
      stroke: currentColor;
    }

    .round-btn.back {
      left: 4.17%;
    }

    .round-btn.more {
      right: 4.6%;
    }

    .brand {
      position: absolute;
      top: 5.78%;
      z-index: 2;
      width: 100%;
      margin: 0;
      color: #d9cdbd;
      font-size: clamp(28px, 4.86vw, 56px);
      font-weight: 400;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px min(1.1vw, 13px) rgba(0, 0, 0, 0.36);
    }

    .headline {
      position: absolute;
      top: 10.15%;
      z-index: 2;
      width: 100%;
      margin: 0;
      color: #e7dbc9;
      font-size: clamp(31px, 5.38vw, 62px);
      font-weight: 500;
      line-height: 1.12;
      text-align: center;
      letter-spacing: 0.06em;
      text-shadow: 0 3px min(1.6vw, 18px) rgba(0, 0, 0, 0.35);
    }

    .compare-card {
      position: absolute;
      left: 2.95%;
      top: 15.28%;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 94.1%;
      height: 42.35%;
      overflow: hidden;
      border: min(0.34vw, 4px) solid rgba(206, 210, 190, 0.48);
      border-radius: min(3.82vw, 44px);
      background: #776f65;
      box-shadow: 0 min(1.3vw, 15px) min(5.2vw, 60px) rgba(0, 0, 0, 0.38);
    }

    .portrait-panel {
      position: relative;
      overflow: hidden;
      background: #81796e;
    }

    .portrait-panel.right {
      border-left: min(0.26vw, 3px) solid #e9e0d2;
      background: #81796e;
    }

    .person-photo {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
    }

    .label {
      position: absolute;
      top: 2.5%;
      z-index: 4;
      display: grid;
      place-items: center;
      height: 7.1%;
      padding: 0 2.3%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: #f2e8dc;
      background: rgba(45, 43, 38, 0.92);
      font-size: clamp(15px, 2.6vw, 30px);
      font-weight: 600;
      line-height: 1;
    }

    .label.left {
      left: 2.1%;
    }

    .label.right {
      right: 2.5%;
    }

    .compare-toggle {
      position: absolute;
      right: 3.3%;
      bottom: 3%;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 0.7em;
      width: 22%;
      height: 8.4%;
      padding: 0 2.6%;
      border: 0;
      border-radius: 999px;
      color: #f4ece1;
      background: rgba(62, 57, 52, 0.94);
      font-size: clamp(15px, 2.6vw, 30px);
      font-weight: 600;
      cursor: pointer;
    }

    .compare-toggle svg {
      width: 1.15em;
      height: 1.15em;
      stroke: currentColor;
    }

    .drag-handle {
      position: absolute;
      left: 50%;
      top: 51.5%;
      z-index: 6;
      display: grid;
      place-items: center;
      width: 6.1%;
      aspect-ratio: 1;
      border-radius: 50%;
      color: #2a2a24;
      background: #e8ddcb;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.18);
      transform: translate(-50%, -50%);
    }

    .drag-handle svg {
      width: 56%;
      height: 56%;
      stroke: currentColor;
    }

    .portrait {
      position: absolute;
      inset: 0;
      display: none;
    }

    .hair {
      position: absolute;
      z-index: 1;
      background: radial-gradient(circle at 45% 18%, #221b16 0 10%, #100d0b 39%, #090807 72%);
      filter: drop-shadow(0 9px 8px rgba(0, 0, 0, 0.34));
    }

    .left .hair {
      left: 13%;
      top: -3%;
      width: 79%;
      height: 74%;
      border-radius: 50% 51% 46% 48%;
      transform: rotate(7deg);
    }

    .right .hair {
      left: 2%;
      top: -4%;
      width: 104%;
      height: 110%;
      border-radius: 49% 51% 42% 44%;
      background: radial-gradient(circle at 50% 20%, #1b1b1a 0 10%, #111111 44%, #050505 82%);
    }

    .neck {
      position: absolute;
      left: 41%;
      bottom: 0;
      z-index: 2;
      width: 23%;
      height: 25%;
      border-radius: 45% 45% 0 0;
      background: linear-gradient(180deg, #ddb9a6, #c99b83);
      filter: blur(0.2px);
    }

    .right .neck {
      left: 44%;
      background: linear-gradient(180deg, #e2c4b8, #cfa394);
    }

    .face {
      position: absolute;
      z-index: 3;
      width: 64%;
      height: 61%;
      border-radius: 48% 48% 46% 46%;
      background:
        radial-gradient(circle at 52% 44%, rgba(255, 255, 255, 0.4), transparent 3%),
        radial-gradient(circle at 41% 38%, rgba(230, 160, 152, 0.18), transparent 13%),
        radial-gradient(circle at 66% 41%, rgba(230, 160, 152, 0.2), transparent 14%),
        linear-gradient(180deg, #f2d3c2 0%, #e7bea9 52%, #d5a78d 100%);
      box-shadow: inset 0 -18px 35px rgba(121, 69, 52, 0.1), inset 0 16px 32px rgba(255, 255, 255, 0.22);
    }

    .left .face {
      left: 17%;
      top: 22%;
      transform: rotate(-8deg);
    }

    .right .face {
      left: 18%;
      top: 23%;
      width: 61%;
      height: 59%;
      transform: rotate(3deg);
      background:
        radial-gradient(circle at 51% 42%, rgba(255, 255, 255, 0.4), transparent 3%),
        radial-gradient(circle at 36% 39%, rgba(228, 160, 152, 0.15), transparent 12%),
        radial-gradient(circle at 66% 41%, rgba(230, 160, 152, 0.2), transparent 14%),
        linear-gradient(180deg, #f4d9ce 0%, #e8c6b9 54%, #d2a292 100%);
    }

    .eye,
    .brow,
    .nose,
    .mouth,
    .blush-dot {
      position: absolute;
      z-index: 4;
    }

    .eye {
      top: 42%;
      width: 15%;
      height: 4.7%;
      border-radius: 60% 60% 48% 48%;
      background: #f7eee8;
      border-top: 3px solid #3d2c27;
      box-shadow: inset 0 -3px 0 rgba(72, 45, 38, 0.1);
    }

    .eye::before {
      content: "";
      position: absolute;
      left: 38%;
      top: 8%;
      width: 33%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 45%, #070605 0 22%, #4b2c1d 24% 55%, #9c755e 57%);
    }

    .eye::after {
      content: "";
      position: absolute;
      left: 11%;
      top: -42%;
      width: 90%;
      height: 45%;
      border-radius: 50%;
      border-top: 2px solid rgba(83, 50, 44, 0.46);
    }

    .eye.left-eye { left: 31%; }
    .eye.right-eye { left: 56%; }

    .brow {
      top: 37.8%;
      width: 18%;
      height: 2.3%;
      border-top: 4px solid #4f342b;
      border-radius: 50%;
      opacity: 0.75;
    }

    .brow.left-brow {
      left: 29%;
      transform: rotate(-7deg);
    }

    .brow.right-brow {
      left: 55%;
      transform: rotate(7deg);
    }

    .nose {
      left: 49.5%;
      top: 44%;
      width: 5%;
      height: 18%;
      border-left: 2px solid rgba(121, 76, 64, 0.22);
      border-bottom: 3px solid rgba(121, 76, 64, 0.22);
      border-radius: 0 0 0 40%;
      transform: rotate(8deg);
    }

    .mouth {
      left: 40%;
      top: 65%;
      width: 24%;
      height: 7.5%;
      border-radius: 44% 44% 55% 55%;
      background:
        linear-gradient(180deg, transparent 0 46%, rgba(110, 55, 55, 0.55) 47% 52%, transparent 53%),
        radial-gradient(ellipse at 50% 28%, #d78582 0 36%, transparent 37%),
        radial-gradient(ellipse at 50% 72%, #b95e5e 0 46%, transparent 47%);
      border: 1px solid rgba(118, 52, 50, 0.3);
      transform: rotate(2deg);
    }

    .left .mouth {
      transform: rotate(-5deg);
    }

    .shoulder {
      position: absolute;
      bottom: -6%;
      z-index: 2;
      width: 78%;
      height: 23%;
      border-radius: 48% 48% 0 0;
      background: linear-gradient(180deg, #efe7dd, #d5c9bb);
      opacity: 0.95;
    }

    .left .shoulder {
      left: -5%;
      transform: rotate(8deg);
    }

    .right .shoulder {
      left: 39%;
      width: 66%;
      background: linear-gradient(180deg, #dbe4e8, #c2cbd0);
      transform: rotate(-8deg);
    }

    .hairline {
      position: absolute;
      z-index: 5;
      top: 21%;
      width: 38%;
      height: 25%;
      border-left: 2px solid rgba(54, 33, 26, 0.3);
      border-radius: 50%;
    }

    .left .hairline {
      left: 39%;
      transform: rotate(24deg);
    }

    .right .hairline {
      left: 39%;
      top: 20%;
      transform: rotate(18deg);
    }

    .ear {
      position: absolute;
      z-index: 2;
      top: 48%;
      width: 8%;
      height: 12%;
      border-radius: 50%;
      background: #ddb5a2;
    }

    .ear.left-ear { left: 13%; }
    .ear.right-ear { right: 18%; }

    .right .ear.right-ear { right: 13%; }
    .right .ear.left-ear { left: 16%; }

    .annotation {
      position: absolute;
      z-index: 7;
      fill: rgba(236, 151, 151, 0.2);
      stroke: rgba(255, 235, 223, 0.86);
      stroke-width: 2;
      stroke-dasharray: 8 7;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.08));
    }

    .ann-eye {
      left: 53%;
      top: 34.5%;
      width: 24%;
      height: 12%;
      transform: rotate(-11deg);
    }

    .ann-cheek {
      left: 54%;
      top: 44%;
      width: 28%;
      height: 17%;
      transform: rotate(-17deg);
    }

    .ann-mouth {
      left: 33%;
      top: 61%;
      width: 26%;
      height: 11%;
      transform: rotate(-4deg);
    }

    .right .ann-eye {
      left: 36%;
      top: 35.4%;
      transform: rotate(-5deg);
    }

    .right .ann-cheek {
      left: 42%;
      top: 45%;
      transform: rotate(-14deg);
    }

    .right .ann-mouth {
      left: 28%;
      top: 62%;
      transform: rotate(1deg);
    }

    .makeup-card {
      position: absolute;
      left: 3.04%;
      top: 58.84%;
      z-index: 2;
      width: 93.92%;
      height: 34.82%;
      border: 1px solid var(--stroke);
      border-radius: min(3.13vw, 36px);
      background:
        radial-gradient(circle at 72% 22%, rgba(211, 216, 185, 0.12), transparent 22%),
        radial-gradient(circle at 40% 80%, rgba(78, 112, 83, 0.18), transparent 26%),
        rgba(22, 43, 31, 0.65);
      box-shadow: inset 0 0 min(2.1vw, 24px) rgba(255, 255, 255, 0.04), 0 min(1.56vw, 18px) min(4.8vw, 55px) rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(8px);
    }

    .makeup-title {
      position: absolute;
      left: 4%;
      top: 5.8%;
      margin: 0;
      color: #f2e6d8;
      font-size: clamp(28px, 5.04vw, 58px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .score {
      position: absolute;
      left: 35.6%;
      top: 5.5%;
      display: inline-flex;
      align-items: center;
      height: 8.4%;
      padding: 0 2.2%;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 999px;
      color: #eeb0a8;
      background: rgba(78, 80, 70, 0.72);
      font-size: clamp(14px, 2.52vw, 29px);
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .steps {
      position: absolute;
      left: 3.4%;
      top: 17.8%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2%;
      width: 93%;
      height: 40.3%;
    }

    .step {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(235, 230, 210, 0.22);
      border-radius: min(2.08vw, 24px);
      background:
        radial-gradient(circle at 52% 42%, rgba(238, 216, 198, 0.12), transparent 32%),
        rgba(55, 76, 61, 0.54);
      box-shadow: inset 0 0 min(1.6vw, 18px) rgba(255, 255, 255, 0.04);
    }

    .step-no {
      position: absolute;
      left: 10.4%;
      top: 8%;
      color: #fbf5eb;
      font-size: clamp(17px, 2.95vw, 34px);
      line-height: 1;
      font-weight: 500;
    }

    .done {
      position: absolute;
      right: 6.4%;
      top: 6%;
      display: grid;
      place-items: center;
      width: 16.5%;
      aspect-ratio: 1;
      border-radius: 50%;
      color: #375447;
      background: #c9bea0;
      box-shadow: 0 2px min(0.95vw, 11px) rgba(0, 0, 0, 0.24);
    }

    .done svg {
      width: 58%;
      height: 58%;
      stroke: currentColor;
    }

    .step-art {
      position: absolute;
      left: 50%;
      top: 30%;
      width: 68%;
      height: 44%;
      transform: translateX(-50%);
    }

    .step-art svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .step-label {
      position: absolute;
      left: 0;
      bottom: 11.5%;
      width: 100%;
      color: #fff8ee;
      font-size: clamp(16px, 2.78vw, 32px);
      font-weight: 600;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 2px min(0.7vw, 8px) rgba(0, 0, 0, 0.24);
    }

    .save {
      position: absolute;
      left: 4.15%;
      top: 63.5%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3.8%;
      width: 91%;
      height: 17%;
      border: 0;
      border-radius: 999px;
      color: #321615;
      background:
        radial-gradient(circle at 93.5% 50%, rgba(124, 62, 66, 0.72) 0 4.4%, transparent 4.5%),
        linear-gradient(180deg, #ffe0dc 0%, #f6b7b4 100%);
      box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.65), 0 min(1.56vw, 18px) min(3.3vw, 38px) rgba(0, 0, 0, 0.24);
      font-size: clamp(26px, 4.51vw, 52px);
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .book-mark {
      position: relative;
      width: 5.2%;
      aspect-ratio: 0.9;
      border-radius: 7% 7% 3% 3%;
      background: linear-gradient(90deg, #38513f 0 49%, #ead8ba 50% 100%);
      box-shadow: inset 0 0 0 2px rgba(35, 54, 43, 0.35);
    }

    .book-mark::after {
      content: "";
      position: absolute;
      right: 12%;
      top: 0;
      width: 21%;
      height: 33%;
      background: #304031;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 72%, 0 100%);
    }

    .save-arrow {
      position: absolute;
      right: 5.5%;
      top: 50%;
      display: grid;
      place-items: center;
      width: 7.7%;
      aspect-ratio: 1;
      border-radius: 50%;
      color: #fff8f2;
      transform: translateY(-50%);
    }

    .save-arrow svg {
      width: 45%;
      height: 45%;
      stroke: currentColor;
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(110deg, transparent 0 42%, rgba(255, 255, 255, 0.38) 48%, transparent 55%);
      opacity: 0;
      transform: translateX(-80%);
      pointer-events: none;
    }

    .record {
      position: absolute;
      left: 3.4%;
      bottom: 3.2%;
      display: flex;
      align-items: center;
      width: 93%;
      height: 11.5%;
      padding-left: 12.2%;
      border: 1px solid rgba(230, 222, 198, 0.23);
      border-radius: min(2.7vw, 31px);
      color: #eee4d7;
      background: rgba(22, 37, 28, 0.34);
      font-size: clamp(18px, 3.21vw, 37px);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .record svg.clock {
      position: absolute;
      left: 4.8%;
      width: 5.4%;
      aspect-ratio: 1;
      stroke: #efe3d5;
    }

    .record svg.chevron {
      position: absolute;
      right: 4.5%;
      width: 2.3%;
      height: 40%;
      stroke: #ddd4c8;
    }

    .tabbar {
      position: absolute;
      left: 3.04%;
      bottom: 0.24%;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 93.92%;
      height: 5.47%;
      overflow: hidden;
      border: 1px solid rgba(230, 222, 198, 0.22);
      border-radius: min(2.6vw, 30px);
      background: rgba(25, 45, 34, 0.58);
      box-shadow: 0 min(-0.7vw, -8px) min(2.6vw, 30px) rgba(0, 0, 0, 0.18), inset 0 0 min(2.4vw, 28px) rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(6px);
    }

    .tab {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5%;
      border: 0;
      color: #ded4c5;
      background: rgba(255, 255, 255, 0.03);
      font-size: clamp(16px, 2.95vw, 34px);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      cursor: pointer;
    }

    .tab.active {
      border: 2px solid rgba(206, 196, 159, 0.72);
      border-radius: min(2.6vw, 30px);
      background: rgba(34, 58, 42, 0.78);
      box-shadow: inset 0 0 min(1.74vw, 20px) rgba(231, 215, 171, 0.06);
    }

    .tab svg {
      width: 9.8%;
      height: 41%;
      stroke: #ded4c5;
    }

    .tab.active svg {
      fill: #ead9b7;
      stroke: #3f4e42;
    }

    .tab-indicator {
      position: absolute;
      inset: auto 50% 0 0;
      height: 3px;
      background: rgba(235, 222, 184, 0.75);
      transform-origin: left center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (orientation: landscape) {
      body {
        place-items: center;
      }
    }
  </style>
</head>

  <script src="gsap.min.js"></script>
  <script>
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const ease = "power3.out";

    if (!reduceMotion && window.gsap) {
      gsap.set([".brand", ".headline", ".compare-card", ".makeup-card", ".tabbar"], { autoAlpha: 0, y: 28 });
      gsap.set(".portrait-panel.left", { xPercent: -8, autoAlpha: 0 });
      gsap.set(".portrait-panel.right", { xPercent: 8, autoAlpha: 0 });
      gsap.set([".label", ".drag-handle", ".compare-toggle"], { scale: 0.92, autoAlpha: 0 });
      gsap.set(".step", { y: 34, autoAlpha: 0 });
      gsap.set(".done", { scale: 0 });
      gsap.set(".save", { y: 18, autoAlpha: 0 });
      gsap.set(".record", { y: 16, autoAlpha: 0 });

      gsap.timeline({ defaults: { ease, duration: 0.72 } })
        .to(".brand", { autoAlpha: 1, y: 0, duration: 0.58 })
        .to(".headline", { autoAlpha: 1, y: 0 }, "-=0.34")
        .to(".compare-card", { autoAlpha: 1, y: 0 }, "-=0.3")
        .to(".portrait-panel.left", { autoAlpha: 1, xPercent: 0, duration: 0.7 }, "-=0.48")
        .to(".portrait-panel.right", { autoAlpha: 1, xPercent: 0, duration: 0.7 }, "<")
        .to([".label", ".drag-handle", ".compare-toggle"], { autoAlpha: 1, scale: 1, stagger: 0.07, duration: 0.42 }, "-=0.22")
        .to(".makeup-card", { autoAlpha: 1, y: 0 }, "-=0.22")
        .to(".step", { autoAlpha: 1, y: 0, stagger: 0.08, duration: 0.5 }, "-=0.2")
        .to(".done", { scale: 1, stagger: 0.06, duration: 0.35, ease: "back.out(2.2)" }, "-=0.2")
        .to(".save", { autoAlpha: 1, y: 0, duration: 0.45 }, "-=0.1")
        .to(".record", { autoAlpha: 1, y: 0, duration: 0.4 }, "-=0.2")
        .to(".tabbar", { autoAlpha: 1, y: 0, duration: 0.42 }, "-=0.25");

      gsap.fromTo(".draw-line", {
        strokeDashoffset: 90
      }, {
        strokeDashoffset: 0,
        duration: 1.5,
        ease: "sine.inOut",
        stagger: 0.08,
        delay: 0.35
      });

      gsap.to(".annotation", {
        autoAlpha: 0.72,
        scale: 1.025,
        transformOrigin: "50% 50%",
        duration: 1.8,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut",
        stagger: 0.12
      });

      gsap.to(".shine", {
        xPercent: 190,
        opacity: 0.55,
        duration: 1.2,
        delay: 1.55,
        repeat: -1,
        repeatDelay: 2.8,
        ease: "power2.inOut"
      });

      document.querySelector(".compare-toggle").addEventListener("click", (event) => {
        gsap.fromTo(event.currentTarget, { scale: 0.96 }, { scale: 1, duration: 0.34, ease: "back.out(3)" });
        gsap.fromTo(".drag-handle", { xPercent: -50, scale: 0.9 }, { xPercent: -50, scale: 1, duration: 0.34, ease: "back.out(2.4)" });
      });

      document.querySelectorAll(".tab").forEach((tab, index) => {
        tab.addEventListener("click", (event) => {
          event.preventDefault();
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          gsap.to(".tab-indicator", {
            xPercent: index === 0 ? 0 : 100,
            duration: 0.28,
            ease
          });
        });
      });
    }
  </script>
</body>
